<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 404" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0070AD"/>
    </marker>
    <marker id="arrGrey" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E8B57"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003A5D"/>
      <stop offset="50%" stop-color="#0070AD"/>
      <stop offset="100%" stop-color="#0070AD"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="404" rx="12" fill="#FAFBFC"/>

  <!-- Header -->
  <rect width="1100" height="46" rx="12" fill="url(#headerGrad)"/>
  <rect y="34" width="1100" height="12" fill="url(#headerGrad)"/>
  <text x="24" y="22" fill="white" font-size="10" font-weight="600" letter-spacing="0.5">CASE OVERVIEW | Healthcare</text>
  <text x="1076" y="36" text-anchor="end" fill="white" font-size="18" font-weight="700">Technical Architecture</text>
  <text x="24" y="38" fill="white" font-size="12" font-weight="400">AgentCare &#x2014; Component Integration</text>

  <!-- ===== LEFT: USERS ===== -->
  <text x="65" y="66" text-anchor="middle" font-size="8" font-weight="700" fill="#6C757D" letter-spacing="1">USERS</text>

  <rect x="16" y="76" width="98" height="50" rx="8" fill="white" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="65" y="96" text-anchor="middle" font-size="9" font-weight="700" fill="#003A5D">Patient</text>
  <text x="65" y="110" text-anchor="middle" font-size="7" fill="#555">Practice website</text>

  <rect x="16" y="140" width="98" height="50" rx="8" fill="white" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="65" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="#003A5D">Clinician</text>
  <text x="65" y="174" text-anchor="middle" font-size="7" fill="#555">Microsoft Teams</text>

  <!-- ===== ENTRA ID (separate, between users and Power Platform) ===== -->
  <rect x="130" y="76" width="70" height="114" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <text x="165" y="126" text-anchor="middle" font-size="9" font-weight="700" fill="#155724">Entra</text>
  <text x="165" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#155724">ID</text>
  <text x="165" y="156" text-anchor="middle" font-size="6" fill="#2E8B57">Auto (Teams)</text>
  <text x="165" y="166" text-anchor="middle" font-size="6" fill="#2E8B57">Sign-in (web)</text>

  <!-- User → Entra ID -->
  <line x1="114" y1="101" x2="130" y2="101" stroke="#2E8B57" stroke-width="1.2" marker-end="url(#arrGreen)"/>
  <line x1="114" y1="165" x2="130" y2="165" stroke="#2E8B57" stroke-width="1.2" marker-end="url(#arrGreen)"/>

  <!-- Entra ID → Power Platform -->
  <line x1="200" y1="133" x2="220" y2="133" stroke="#0070AD" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== POWER PLATFORM (big container) ===== -->
  <rect x="224" y="56" width="760" height="294" rx="12" fill="#f0f4f8" stroke="#6C757D" stroke-width="2"/>
  <text x="604" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#6C757D" letter-spacing="1">MICROSOFT POWER PLATFORM</text>

  <!-- === COPILOT STUDIO (inside Power Platform) === -->
  <rect x="236" y="82" width="480" height="170" rx="10" fill="#E8F4FA" stroke="#003A5D" stroke-width="2" filter="url(#shadow)"/>
  <rect x="236" y="82" width="480" height="22" rx="10" fill="#003A5D"/>
  <rect x="236" y="92" width="480" height="12" fill="#003A5D"/>
  <text x="476" y="98" text-anchor="middle" fill="white" font-size="10" font-weight="700" letter-spacing="0.5">COPILOT STUDIO</text>

  <!-- Agents -->
  <text x="250" y="120" font-size="7" font-weight="700" fill="#003A5D">AGENTS</text>
  <rect x="250" y="126" width="108" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1.5"/>
  <text x="304" y="142" text-anchor="middle" font-size="8" font-weight="700" fill="#003A5D">Triage</text>
  <text x="304" y="154" text-anchor="middle" font-size="6" fill="#555">Emergency, urgency</text>

  <rect x="366" y="126" width="108" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1.5"/>
  <text x="420" y="142" text-anchor="middle" font-size="8" font-weight="700" fill="#003A5D">Scheduling</text>
  <text x="420" y="154" text-anchor="middle" font-size="6" fill="#555">Booking, waitlist</text>

  <rect x="482" y="126" width="108" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1.5"/>
  <text x="536" y="142" text-anchor="middle" font-size="8" font-weight="700" fill="#003A5D">Documentation</text>
  <text x="536" y="154" text-anchor="middle" font-size="6" fill="#555">SOAP, entities</text>

  <rect x="598" y="126" width="108" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1.5"/>
  <text x="652" y="142" text-anchor="middle" font-size="8" font-weight="700" fill="#003A5D">Referral</text>
  <text x="652" y="154" text-anchor="middle" font-size="6" fill="#555">Draft, validate, send</text>

  <!-- Topics + Prompt Actions + Knowledge -->
  <text x="250" y="178" font-size="7" font-weight="700" fill="#003A5D">CAPABILITIES</text>
  <rect x="250" y="184" width="148" height="24" rx="4" fill="white" stroke="#0070AD" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="324" y="200" text-anchor="middle" font-size="8" font-weight="600" fill="#003A5D">Topics</text>

  <rect x="406" y="184" width="148" height="24" rx="4" fill="white" stroke="#0070AD" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="200" text-anchor="middle" font-size="8" font-weight="600" fill="#003A5D">Prompt Actions</text>

  <rect x="562" y="184" width="148" height="24" rx="4" fill="white" stroke="#0070AD" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="636" y="200" text-anchor="middle" font-size="8" font-weight="600" fill="#003A5D">Knowledge</text>

  <!-- Agent routing labels -->
  <text x="250" y="228" font-size="6" fill="#0070AD">Patient &#x2192; Triage + Scheduling</text>
  <text x="250" y="238" font-size="6" fill="#0070AD">Clinician &#x2192; Documentation + Referral</text>

  <!-- === POWER AUTOMATE (inside Power Platform, right of Copilot Studio) === -->
  <rect x="736" y="82" width="236" height="170" rx="10" fill="#e8f5e9" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <rect x="736" y="82" width="236" height="22" rx="10" fill="#2E8B57"/>
  <rect x="736" y="92" width="236" height="12" fill="#2E8B57"/>
  <text x="854" y="98" text-anchor="middle" fill="white" font-size="10" font-weight="700" letter-spacing="0.5">POWER AUTOMATE</text>

  <text x="750" y="120" font-size="7" font-weight="700" fill="#1b5e20">AGENT FLOWS</text>
  <rect x="750" y="126" width="210" height="22" rx="4" fill="white" stroke="#2E8B57" stroke-width="1"/>
  <text x="855" y="141" text-anchor="middle" font-size="7" font-weight="600" fill="#1b5e20">Appointment confirmations + reminders</text>
  <rect x="750" y="152" width="210" height="22" rx="4" fill="white" stroke="#2E8B57" stroke-width="1"/>
  <text x="855" y="167" text-anchor="middle" font-size="7" font-weight="600" fill="#1b5e20">Send referral + notify patient</text>

  <text x="750" y="192" font-size="7" font-weight="700" fill="#1b5e20">CONNECTORS</text>
  <rect x="750" y="198" width="210" height="22" rx="4" fill="white" stroke="#2E8B57" stroke-width="1"/>
  <text x="855" y="213" text-anchor="middle" font-size="7" font-weight="600" fill="#2E8B57">Dataverse Connector</text>
  <rect x="750" y="224" width="210" height="22" rx="4" fill="white" stroke="#2E8B57" stroke-width="1"/>
  <text x="855" y="239" text-anchor="middle" font-size="7" font-weight="600" fill="#2E8B57">Outlook Connector</text>

  <!-- Copilot Studio → Power Automate (horizontal) -->
  <line x1="716" y1="133" x2="736" y2="133" stroke="#2E8B57" stroke-width="1.2" marker-end="url(#arrGreen)"/>

  <!-- === DATAVERSE (inside Power Platform, bottom) === -->
  <rect x="236" y="270" width="736" height="66" rx="10" fill="white" stroke="#6C757D" stroke-width="2" filter="url(#shadow)"/>
  <rect x="236" y="270" width="736" height="22" rx="10" fill="#6C757D"/>
  <rect x="236" y="280" width="736" height="12" fill="#6C757D"/>
  <text x="604" y="288" text-anchor="middle" fill="white" font-size="10" font-weight="700" letter-spacing="0.5">DATAVERSE</text>

  <rect x="250" y="300" width="108" height="22" rx="3" fill="#f0f0f0"/>
  <text x="304" y="315" text-anchor="middle" font-size="7" font-weight="500" fill="#333">Patients</text>
  <rect x="366" y="300" width="108" height="22" rx="3" fill="#f0f0f0"/>
  <text x="420" y="315" text-anchor="middle" font-size="7" font-weight="500" fill="#333">Triage Records</text>
  <rect x="482" y="300" width="108" height="22" rx="3" fill="#f0f0f0"/>
  <text x="536" y="315" text-anchor="middle" font-size="7" font-weight="500" fill="#333">Appointments</text>
  <rect x="598" y="300" width="108" height="22" rx="3" fill="#f0f0f0"/>
  <text x="652" y="315" text-anchor="middle" font-size="7" font-weight="500" fill="#333">Encounters</text>
  <rect x="714" y="300" width="108" height="22" rx="3" fill="#f0f0f0"/>
  <text x="768" y="315" text-anchor="middle" font-size="7" font-weight="500" fill="#333">Referrals</text>
  <rect x="830" y="300" width="108" height="22" rx="3" fill="#f0f0f0"/>
  <text x="884" y="315" text-anchor="middle" font-size="7" font-weight="500" fill="#333">Audit Logs</text>

  <!-- Copilot Studio → Dataverse (vertical) -->
  <line x1="476" y1="252" x2="476" y2="270" stroke="#6C757D" stroke-width="1.2" marker-end="url(#arrGrey)"/>
  <text x="490" y="264" font-size="6" fill="#6C757D" font-weight="600">Read / Write</text>

  <!-- Power Automate → Dataverse (vertical) -->
  <line x1="854" y1="252" x2="854" y2="270" stroke="#6C757D" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrGrey)"/>
  <text x="868" y="264" font-size="6" fill="#6C757D">audit log</text>

  <!-- ===== RIGHT: EXTERNAL ===== -->
  <text x="1020" y="66" text-anchor="middle" font-size="8" font-weight="700" fill="#6C757D" letter-spacing="1">EXTERNAL</text>

  <rect x="1000" y="82" width="90" height="100" rx="8" fill="white" stroke="#E8912D" stroke-width="2" filter="url(#shadow)"/>
  <text x="1045" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Outlook</text>
  <text x="1045" y="134" text-anchor="middle" font-size="7" fill="#555">Referral letters</text>
  <text x="1045" y="146" text-anchor="middle" font-size="7" fill="#555">Confirmations</text>
  <text x="1045" y="158" text-anchor="middle" font-size="7" fill="#555">Patient emails</text>

  <!-- Power Automate → Outlook (horizontal) -->
  <line x1="972" y1="133" x2="1000" y2="133" stroke="#E8912D" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== SECURITY + FRAMEWORKS ===== -->
  <rect x="16" y="366" width="1064" height="24" rx="6" fill="#d4edda" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="550" y="382" text-anchor="middle" font-size="8" fill="#155724">
    <tspan font-weight="700">Security: </tspan>
    <tspan>Entra ID (auth)</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Dataverse RBAC</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Encryption at rest &#x26; transit</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Synthetic data (hackathon)</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Immutable audit trail</tspan>
  </text>


</svg>
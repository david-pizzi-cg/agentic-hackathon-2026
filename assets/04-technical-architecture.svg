<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0070AD"/>
    </marker>
    <marker id="arrGrey" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E8B57"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003A5D"/>
      <stop offset="50%" stop-color="#0070AD"/>
      <stop offset="100%" stop-color="#0070AD"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="380" rx="12" fill="#FAFBFC"/>

  <!-- Header -->
  <rect width="1000" height="46" rx="12" fill="url(#headerGrad)"/>
  <rect y="34" width="1000" height="12" fill="url(#headerGrad)"/>
  <text x="24" y="22" fill="white" font-size="10" font-weight="600" letter-spacing="0.5">CASE OVERVIEW | Healthcare</text>
  <text x="976" y="36" text-anchor="end" fill="white" font-size="18" font-weight="700">Technical Architecture</text>
  <text x="24" y="38" fill="white" font-size="12" font-weight="400">AgentCare &#x2014; Component Integration</text>

  <!-- ===== LEFT: USERS ===== -->
  <text x="65" y="66" text-anchor="middle" font-size="8" font-weight="700" fill="#6C757D" letter-spacing="1">USERS</text>

  <rect x="16" y="76" width="98" height="50" rx="8" fill="white" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="65" y="96" text-anchor="middle" font-size="9" font-weight="700" fill="#003A5D">Patient</text>
  <text x="65" y="110" text-anchor="middle" font-size="7" fill="#555">Practice website</text>

  <rect x="16" y="140" width="98" height="50" rx="8" fill="white" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="65" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="#003A5D">Clinician</text>
  <text x="65" y="174" text-anchor="middle" font-size="7" fill="#555">Microsoft Teams</text>

  <!-- NHS 111 knowledge source -->
  <rect x="16" y="204" width="98" height="36" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="65" y="220" text-anchor="middle" font-size="8" font-weight="700" fill="#666">NHS 111</text>
  <text x="65" y="232" text-anchor="middle" font-size="6" fill="#555">Public website</text>
  <!-- Right-angle connector to Knowledge in Copilot Studio -->
  <line x1="114" y1="222" x2="228" y2="222" stroke="#888" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="228" y1="222" x2="228" y2="196" stroke="#888" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="228" y1="196" x2="250" y2="196" stroke="#888" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrGrey)"/>

  <!-- M365 Services used -->
  <rect x="16" y="252" width="184" height="76" rx="8" fill="white" stroke="#0078D4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="108" y="268" text-anchor="middle" font-size="8" font-weight="700" fill="#0078D4" letter-spacing="1">M365 SERVICES</text>
  <text x="52" y="288" text-anchor="middle" font-size="7" font-weight="600" fill="#E8912D">Outlook</text>
  <text x="52" y="302" text-anchor="middle" font-size="7" font-weight="600" fill="#5B5FC7">Teams</text>
  <text x="148" y="288" text-anchor="middle" font-size="7" font-weight="600" fill="#0078D4">Graph API</text>
  <text x="148" y="302" text-anchor="middle" font-size="7" font-weight="600" fill="#0078D4">OneDrive</text>

  <!-- M365 to Power Platform connector (horizontal) -->
  <line x1="200" y1="290" x2="224" y2="290" stroke="#0078D4" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ===== ENTRA ID (separate, between users and Power Platform) ===== -->
  <rect x="130" y="76" width="70" height="114" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <text x="165" y="126" text-anchor="middle" font-size="9" font-weight="700" fill="#155724">Entra</text>
  <text x="165" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#155724">ID</text>
  <text x="165" y="156" text-anchor="middle" font-size="6" fill="#2E8B57">Auto (Teams)</text>
  <text x="165" y="166" text-anchor="middle" font-size="6" fill="#2E8B57">Sign-in (web)</text>

  <!-- User → Entra ID -->
  <line x1="114" y1="101" x2="130" y2="101" stroke="#2E8B57" stroke-width="1.2" marker-end="url(#arrGreen)"/>
  <line x1="114" y1="165" x2="130" y2="165" stroke="#2E8B57" stroke-width="1.2" marker-end="url(#arrGreen)"/>

  <!-- Entra ID → Power Platform -->
  <line x1="200" y1="133" x2="220" y2="133" stroke="#0070AD" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== POWER PLATFORM (big container) ===== -->
  <rect x="224" y="56" width="750" height="272" rx="12" fill="#f0f4f8" stroke="#6C757D" stroke-width="2"/>
  <text x="604" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#6C757D" letter-spacing="1">MICROSOFT POWER PLATFORM</text>

  <!-- === COPILOT STUDIO (inside Power Platform) === -->
  <rect x="236" y="82" width="480" height="134" rx="10" fill="#E8F4FA" stroke="#003A5D" stroke-width="2" filter="url(#shadow)"/>
  <rect x="236" y="82" width="480" height="22" rx="10" fill="#003A5D"/>
  <rect x="236" y="92" width="480" height="12" fill="#003A5D"/>
  <text x="476" y="98" text-anchor="middle" fill="white" font-size="10" font-weight="700" letter-spacing="0.5">COPILOT STUDIO</text>

  <!-- Row 1: Agents (3 equal boxes, full width) -->
  <text x="250" y="118" font-size="7" font-weight="700" fill="#003A5D">AGENTS</text>
  <rect x="250" y="122" width="148" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1.5"/>
  <text x="324" y="138" text-anchor="middle" font-size="8" font-weight="700" fill="#003A5D">Triage</text>
  <text x="324" y="150" text-anchor="middle" font-size="6" fill="#555">Emergency, urgency</text>

  <rect x="406" y="122" width="148" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1.5"/>
  <text x="480" y="138" text-anchor="middle" font-size="8" font-weight="700" fill="#003A5D">Scheduling</text>
  <text x="480" y="150" text-anchor="middle" font-size="6" fill="#555">Booking, waitlist</text>

  <rect x="562" y="122" width="148" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1.5"/>
  <text x="636" y="138" text-anchor="middle" font-size="8" font-weight="700" fill="#003A5D">Documentation</text>
  <text x="636" y="150" text-anchor="middle" font-size="6" fill="#555">SOAP from transcript</text>

  <!-- Row 2: 5 equal boxes -->
  <rect x="250" y="170" width="88" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="294" y="186" text-anchor="middle" font-size="7" font-weight="600" fill="#003A5D">Knowledge</text>
  <text x="294" y="198" text-anchor="middle" font-size="5.5" fill="#555">NHS 111</text>

  <rect x="346" y="170" width="88" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="390" y="186" text-anchor="middle" font-size="7" font-weight="600" fill="#003A5D">Topics</text>
  <text x="390" y="198" text-anchor="middle" font-size="5.5" fill="#555">Conversation flows</text>

  <rect x="442" y="170" width="88" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="486" y="186" text-anchor="middle" font-size="7" font-weight="600" fill="#003A5D">Triggers</text>
  <text x="486" y="198" text-anchor="middle" font-size="5.5" fill="#555">V3, OneDrive</text>

  <rect x="538" y="170" width="88" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="582" y="186" text-anchor="middle" font-size="7" font-weight="600" fill="#003A5D">Prompts</text>
  <text x="582" y="198" text-anchor="middle" font-size="5.5" fill="#555">Custom actions</text>

  <rect x="634" y="170" width="76" height="36" rx="4" fill="white" stroke="#0070AD" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="672" y="186" text-anchor="middle" font-size="7" font-weight="600" fill="#003A5D">Agent Flows</text>
  <text x="672" y="198" text-anchor="middle" font-size="5.5" fill="#555">Cloud Flows</text>


  <!-- === POWER AUTOMATE (inside Power Platform, right of Copilot Studio) === -->
  <rect x="728" y="82" width="234" height="236" rx="10" fill="#e8f5e9" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <rect x="728" y="82" width="234" height="22" rx="10" fill="#2E8B57"/>
  <rect x="728" y="92" width="234" height="12" fill="#2E8B57"/>
  <text x="845" y="98" text-anchor="middle" fill="white" font-size="10" font-weight="700" letter-spacing="0.5">POWER AUTOMATE</text>

  <text x="742" y="120" font-size="7" font-weight="700" fill="#1b5e20">CLOUD FLOWS</text>
  <rect x="742" y="126" width="208" height="22" rx="4" fill="white" stroke="#2E8B57" stroke-width="1"/>
  <text x="846" y="141" text-anchor="middle" font-size="7" font-weight="600" fill="#1b5e20">Flow 1</text>
  <rect x="742" y="152" width="208" height="22" rx="4" fill="white" stroke="#2E8B57" stroke-width="1"/>
  <text x="846" y="167" text-anchor="middle" font-size="7" font-weight="600" fill="#1b5e20">Flow 2</text>
  <rect x="742" y="178" width="208" height="22" rx="4" fill="white" stroke="#2E8B57" stroke-width="1"/>
  <text x="846" y="193" text-anchor="middle" font-size="7" font-weight="600" fill="#1b5e20">Flow n</text>

  <text x="742" y="218" font-size="7" font-weight="700" fill="#1b5e20">CONNECTORS</text>
  <rect x="742" y="224" width="208" height="18" rx="4" fill="white" stroke="#E8912D" stroke-width="1"/>
  <text x="846" y="237" text-anchor="middle" font-size="6.5" font-weight="600" fill="#E8912D">Outlook</text>
  <rect x="742" y="246" width="208" height="18" rx="4" fill="white" stroke="#5B5FC7" stroke-width="1"/>
  <text x="846" y="259" text-anchor="middle" font-size="6.5" font-weight="600" fill="#5B5FC7">Teams</text>
  <rect x="742" y="268" width="208" height="18" rx="4" fill="white" stroke="#0078D4" stroke-width="1"/>
  <text x="846" y="281" text-anchor="middle" font-size="6.5" font-weight="600" fill="#0078D4">Graph API</text>
  <rect x="742" y="290" width="208" height="18" rx="4" fill="white" stroke="#0078D4" stroke-width="1"/>
  <text x="846" y="303" text-anchor="middle" font-size="6.5" font-weight="600" fill="#0078D4">OneDrive</text>

  <!-- Copilot Studio → Power Automate (horizontal) -->
  <line x1="716" y1="149" x2="728" y2="149" stroke="#2E8B57" stroke-width="1.2" marker-end="url(#arrGreen)"/>

  <!-- === DATAVERSE (below Copilot Studio, same width) === -->
  <rect x="236" y="262" width="480" height="56" rx="10" fill="white" stroke="#6C757D" stroke-width="2" filter="url(#shadow)"/>
  <rect x="236" y="262" width="480" height="20" rx="10" fill="#6C757D"/>
  <rect x="236" y="272" width="480" height="10" fill="#6C757D"/>
  <text x="476" y="278" text-anchor="middle" fill="white" font-size="10" font-weight="700" letter-spacing="0.5">DATAVERSE</text>

  <rect x="250" y="290" width="86" height="20" rx="3" fill="#f0f0f0"/>
  <text x="293" y="304" text-anchor="middle" font-size="6.5" font-weight="500" fill="#333">Patients</text>
  <rect x="344" y="290" width="86" height="20" rx="3" fill="#f0f0f0"/>
  <text x="387" y="304" text-anchor="middle" font-size="6.5" font-weight="500" fill="#333">Triage Records</text>
  <rect x="438" y="290" width="86" height="20" rx="3" fill="#f0f0f0"/>
  <text x="481" y="304" text-anchor="middle" font-size="6.5" font-weight="500" fill="#333">Appointments</text>
  <rect x="532" y="290" width="86" height="20" rx="3" fill="#f0f0f0"/>
  <text x="575" y="304" text-anchor="middle" font-size="6.5" font-weight="500" fill="#333">Encounters</text>
  <rect x="626" y="290" width="86" height="20" rx="3" fill="#f0f0f0"/>
  <text x="669" y="304" text-anchor="middle" font-size="6.5" font-weight="500" fill="#333">Audit Logs</text>

  <!-- Power Automate → Dataverse (horizontal) -->
  <line x1="728" y1="290" x2="716" y2="290" stroke="#6C757D" stroke-width="1.2" marker-end="url(#arrGrey)"/>

  <!-- Copilot Studio → Dataverse (vertical) -->
  <line x1="476" y1="216" x2="476" y2="262" stroke="#6C757D" stroke-width="1.2" marker-end="url(#arrGrey)"/>
  <text x="490" y="244" font-size="6" fill="#6C757D" font-weight="600">Read / Write</text>


  <!-- ===== SECURITY + FRAMEWORKS ===== -->
  <rect x="16" y="340" width="964" height="24" rx="6" fill="#d4edda" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="498" y="356" text-anchor="middle" font-size="8" fill="#155724">
    <tspan font-weight="700">Security: </tspan>
    <tspan>Entra ID (auth)</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Dataverse RBAC</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Encryption at rest &#x26; transit</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Synthetic data (hackathon)</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Immutable audit trail</tspan>
  </text>


</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0070AD"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E8912D"/>
    </marker>
  </defs>

  <rect width="1000" height="420" rx="10" fill="#FAFBFC"/>

  <!-- Header -->
  <rect width="1000" height="40" rx="10" fill="#00B0F0"/>
  <rect y="30" width="1000" height="10" fill="#00B0F0"/>
  <text x="20" y="26" fill="white" font-size="14" font-weight="700">Clinical Decision Support Agent (CORE)</text>
  <text x="1000" y="26" text-anchor="end" fill="white" font-size="10" opacity="0.8" font-weight="400" dx="-16">Real-time during consultation | Validates as clinician works</text>

  <!-- PRE-CONSULTATION: auto-loaded -->
  <text x="20" y="66" font-size="10" font-weight="700" fill="#003A5D" letter-spacing="1">PRE-LOADED (before clinician starts)</text>
  <line x1="310" y1="62" x2="980" y2="62" stroke="#ddd" stroke-width="1"/>

  <rect x="20" y="78" width="220" height="55" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="96" text-anchor="middle" font-size="8" font-weight="700" fill="#664d03">FROM TRIAGE + DATAVERSE</text>
  <text x="130" y="112" text-anchor="middle" font-size="9" font-weight="600" fill="#664d03">Symptoms, history, meds, allergies</text>
  <text x="130" y="126" text-anchor="middle" font-size="8" fill="#997a00">Already available when consultation opens</text>

  <line x1="244" y1="105" x2="272" y2="105" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="280" y="78" width="220" height="55" rx="8" fill="#e0f7ff" stroke="#00B0F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="96" text-anchor="middle" font-size="8" font-weight="600" fill="#005a8c">PROMPT ACTION</text>
  <text x="390" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Initial Guideline Match</text>
  <text x="390" y="126" text-anchor="middle" font-size="8" fill="#555">Triage symptoms vs NICE guidelines</text>

  <line x1="504" y1="105" x2="532" y2="105" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="540" y="78" width="220" height="55" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="96" text-anchor="middle" font-size="8" font-weight="600" fill="#0070AD">TEAMS ADAPTIVE CARD</text>
  <text x="650" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Context Panel</text>
  <text x="650" y="126" text-anchor="middle" font-size="8" fill="#555">History + initial guideline suggestions ready</text>

  <!-- DURING CONSULTATION: real-time -->
  <rect x="0" y="150" width="1000" height="4" fill="#ddd"/>
  <text x="20" y="178" font-size="10" font-weight="700" fill="#003A5D" letter-spacing="1">REAL-TIME (as clinician adds to SOAP note)</text>
  <line x1="360" y1="174" x2="980" y2="174" stroke="#ddd" stroke-width="1"/>

  <!-- Drug check -->
  <rect x="20" y="194" width="200" height="55" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="212" text-anchor="middle" font-size="8" font-weight="600" fill="#2E8B57">CLINICIAN ADDS</text>
  <text x="120" y="228" text-anchor="middle" font-size="9" font-weight="600" fill="#155724">New medication or</text>
  <text x="120" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#155724">diagnosis to note</text>

  <line x1="224" y1="221" x2="252" y2="221" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="260" y="194" width="200" height="55" rx="8" fill="#e0f7ff" stroke="#00B0F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="212" text-anchor="middle" font-size="8" font-weight="600" fill="#005a8c">PROMPT ACTION</text>
  <text x="360" y="228" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Drug Interaction Check</text>
  <text x="360" y="242" text-anchor="middle" font-size="8" fill="#555">New med vs current meds (BNF data)</text>

  <!-- Alert or OK -->
  <line x1="464" y1="221" x2="492" y2="221" stroke="#0070AD" stroke-width="2"/>
  <polygon points="525,200 550,221 525,242 500,221" fill="#fff8e6" stroke="#E8912D" stroke-width="1.5"/>
  <text x="525" y="219" text-anchor="middle" font-size="7" font-weight="600" fill="#8B5E00">Issue?</text>

  <!-- Alert -->
  <line x1="554" y1="221" x2="582" y2="221" stroke="#E8912D" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="590" y="198" width="170" height="46" rx="6" fill="#fde8e8" stroke="#cc3333" stroke-width="1.5"/>
  <text x="675" y="216" text-anchor="middle" font-size="9" font-weight="700" fill="#cc3333">Alert: Drug Interaction</text>
  <text x="675" y="232" text-anchor="middle" font-size="8" fill="#cc3333">Severity + BNF source</text>
  <text x="675" y="242" text-anchor="middle" font-size="7" fill="#cc3333">Clinician: accept/dismiss</text>

  <!-- Guideline update -->
  <rect x="260" y="262" width="200" height="55" rx="8" fill="#e0f7ff" stroke="#00B0F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="280" text-anchor="middle" font-size="8" font-weight="600" fill="#005a8c">PROMPT ACTION</text>
  <text x="360" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Update Guideline Match</text>
  <text x="360" y="310" text-anchor="middle" font-size="8" fill="#555">New symptoms/Dx vs NICE guidelines</text>

  <line x1="464" y1="289" x2="586" y2="289" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="590" y="262" width="170" height="55" rx="6" fill="#e8f4fa" stroke="#0070AD" stroke-width="1.5"/>
  <text x="675" y="280" text-anchor="middle" font-size="9" font-weight="700" fill="#003A5D">Guideline Suggestion</text>
  <text x="675" y="296" text-anchor="middle" font-size="8" fill="#555">Pathway + NICE ref</text>
  <text x="675" y="310" text-anchor="middle" font-size="7" fill="#555">Clinician: accept/dismiss</text>

  <!-- Missed referral check -->
  <rect x="260" y="330" width="200" height="55" rx="8" fill="#e0f7ff" stroke="#00B0F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="348" text-anchor="middle" font-size="8" font-weight="600" fill="#005a8c">PROMPT ACTION</text>
  <text x="360" y="364" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Referral Check</text>
  <text x="360" y="378" text-anchor="middle" font-size="8" fill="#555">Diagnosis vs referral criteria</text>

  <line x1="464" y1="357" x2="586" y2="357" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="590" y="330" width="170" height="55" rx="6" fill="#fef3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="675" y="348" text-anchor="middle" font-size="9" font-weight="700" fill="#664d03">Referral Suggested</text>
  <text x="675" y="364" text-anchor="middle" font-size="8" fill="#997a00">Triggers Referral Agent</text>
  <text x="675" y="378" text-anchor="middle" font-size="7" fill="#997a00">if clinician approves</text>

  <!-- All decisions logged -->
  <rect x="800" y="194" width="180" height="192" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>
  <text x="890" y="216" text-anchor="middle" font-size="8" font-weight="700" fill="#666">ALL DECISIONS</text>
  <text x="890" y="232" text-anchor="middle" font-size="8" font-weight="700" fill="#666">&#x2192; DATAVERSE</text>
  <text x="890" y="258" text-anchor="middle" font-size="8" fill="#555">Each alert + clinician</text>
  <text x="890" y="272" text-anchor="middle" font-size="8" fill="#555">response logged with</text>
  <text x="890" y="286" text-anchor="middle" font-size="8" fill="#555">timestamp and reason</text>
  <text x="890" y="310" text-anchor="middle" font-size="8" fill="#555">Feeds into SOAP note</text>
  <text x="890" y="324" text-anchor="middle" font-size="8" fill="#555">(P section) and</text>
  <text x="890" y="338" text-anchor="middle" font-size="8" fill="#555">audit trail</text>

  <!-- Key constraint -->
  <rect x="20" y="398" width="960" height="16" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="500" y="410" text-anchor="middle" font-size="8" fill="#555">All recommendations advisory. Clinician decides. No autonomous clinical action. Every decision audited.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0070AD"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E8B57"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003A5D"/>
      <stop offset="60%" stop-color="#0070AD"/>
      <stop offset="100%" stop-color="#0070AD"/>
    </linearGradient>
    <linearGradient id="footerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0070AD"/>
      <stop offset="100%" stop-color="#003A5D"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="660" rx="12" fill="#F7F9FB"/>

  <!-- HEADER -->
  <rect width="1100" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect y="40" width="1100" height="12" fill="url(#headerGrad)"/>
  <text x="20" y="22" fill="white" font-size="10" font-weight="400" letter-spacing="1.5" opacity="0.85">CASE OVERVIEW | Healthcare</text>
  <text x="20" y="42" fill="white" font-size="16" font-weight="700">Workflow 2: Consultation &#x26; Documentation</text>
  <text x="1080" y="36" text-anchor="end" fill="white" font-size="10" opacity="0.7">Clinician-facing &#x2014; Copilot Chat</text>

  <!-- LEGEND -->
  <rect x="16" y="62" width="1068" height="28" rx="6" fill="white" filter="url(#shadowSm)"/>
  <rect x="28" y="69" width="14" height="14" rx="3" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="48" y="81" font-size="9" fill="#555">Pre-loaded / Trigger</text>
  <circle cx="160" cy="76" r="7" fill="#0070AD"/>
  <text x="172" y="81" font-size="9" fill="#555">Documentation Agent</text>
  <circle cx="290" cy="76" r="7" fill="none" stroke="#2E8B57" stroke-width="1.8"/>
  <text x="302" y="81" font-size="9" fill="#555">Clinician action</text>
  <rect x="395" y="69" width="14" height="14" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="415" y="81" font-size="9" fill="#555">Output / Dataverse</text>
  <rect x="520" y="69" width="14" height="14" rx="3" fill="#e0f7ff" stroke="#00B0F0" stroke-width="1.5"/>
  <text x="540" y="81" font-size="9" fill="#555">Triggers Referral Agent</text>

  <!-- ================================================================ -->
  <!-- PHASE 1: PRE-CONSULTATION                                        -->
  <!-- ================================================================ -->
  <text x="20" y="116" font-size="11" fill="#6C757D" font-weight="700" letter-spacing="1.5">PHASE 1: PRE-CONSULTATION (auto-loaded)</text>
  <line x1="340" y1="112" x2="1084" y2="112" stroke="#ddd" stroke-width="1"/>

  <!-- Trigger -->
  <rect x="20" y="130" width="140" height="56" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="148" text-anchor="middle" font-size="8" font-weight="700" fill="#664d03">TRIGGER</text>
  <text x="90" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#664d03">Consultation ID</text>
  <text x="90" y="178" text-anchor="middle" font-size="8" fill="#997a00">Clinician opens in Copilot</text>

  <line x1="164" y1="158" x2="200" y2="158" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Auto-load -->
  <rect x="200" y="130" width="190" height="56" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="222" cy="150" r="9" fill="#0070AD"/>
  <circle cx="222" cy="148" r="2.8" fill="white"/>
  <path d="M218,155 Q222,152 226,155" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="310" y="148" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Documentation Agent</text>
  <text x="310" y="164" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Load from Dataverse</text>
  <text x="310" y="180" text-anchor="middle" font-size="8" fill="#555">Triage data + patient history</text>

  <line x1="394" y1="158" x2="430" y2="158" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SOAP (S) pre-filled -->
  <rect x="430" y="130" width="310" height="56" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="585" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Copilot Chat: Context Ready</text>
  <text x="585" y="166" text-anchor="middle" font-size="9" fill="#555">SOAP (S) pre-filled from triage symptoms</text>
  <text x="585" y="180" text-anchor="middle" font-size="9" fill="#555">Patient history, meds, allergies visible</text>

  <!-- ================================================================ -->
  <!-- PHASE 2: DURING CONSULTATION                                     -->
  <!-- ================================================================ -->
  <text x="20" y="218" font-size="11" fill="#6C757D" font-weight="700" letter-spacing="1.5">PHASE 2: DURING CONSULTATION</text>
  <line x1="280" y1="214" x2="1084" y2="214" stroke="#ddd" stroke-width="1"/>

  <!-- Clinician adds O -->
  <rect x="20" y="232" width="240" height="50" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="42" cy="257" r="10" fill="none" stroke="#2E8B57" stroke-width="2"/>
  <circle cx="42" cy="254" r="3" fill="#2E8B57"/>
  <path d="M36,263 Q42,259 48,263" fill="none" stroke="#2E8B57" stroke-width="1.3"/>
  <text x="150" y="252" text-anchor="middle" font-size="10" font-weight="700" fill="#155724">Clinician adds Objective (O)</text>
  <text x="150" y="268" text-anchor="middle" font-size="9" fill="#155724">Exam findings, vitals, observations</text>

  <line x1="264" y1="257" x2="300" y2="257" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Doc Agent structures -->
  <rect x="300" y="232" width="210" height="50" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="322" cy="249" r="9" fill="#0070AD"/>
  <circle cx="322" cy="247" r="2.8" fill="white"/>
  <path d="M318,254 Q322,251 326,254" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="420" y="248" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Documentation Agent</text>
  <text x="420" y="262" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Structure into SOAP</text>
  <text x="420" y="276" text-anchor="middle" font-size="8" fill="#555">Real-time formatting</text>

  <!-- Clinician adds A -->
  <rect x="20" y="296" width="240" height="50" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="42" cy="321" r="10" fill="none" stroke="#2E8B57" stroke-width="2"/>
  <circle cx="42" cy="318" r="3" fill="#2E8B57"/>
  <path d="M36,327 Q42,323 48,327" fill="none" stroke="#2E8B57" stroke-width="1.3"/>
  <text x="150" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#155724">Clinician adds Assessment (A)</text>
  <text x="150" y="332" text-anchor="middle" font-size="9" fill="#155724">Diagnosis, clinical impression</text>

  <line x1="264" y1="321" x2="300" y2="321" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Doc Agent structures -->
  <rect x="300" y="296" width="210" height="50" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="322" cy="313" r="9" fill="#0070AD"/>
  <circle cx="322" cy="311" r="2.8" fill="white"/>
  <path d="M318,318 Q322,315 326,318" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="420" y="312" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Documentation Agent</text>
  <text x="420" y="326" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Update SOAP</text>
  <text x="420" y="340" text-anchor="middle" font-size="8" fill="#555">Validates completeness</text>

  <!-- Clinician adds P -->
  <rect x="20" y="360" width="240" height="50" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="42" cy="385" r="10" fill="none" stroke="#2E8B57" stroke-width="2"/>
  <circle cx="42" cy="382" r="3" fill="#2E8B57"/>
  <path d="M36,391 Q42,387 48,391" fill="none" stroke="#2E8B57" stroke-width="1.3"/>
  <text x="150" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#155724">Clinician adds Plan (P)</text>
  <text x="150" y="396" text-anchor="middle" font-size="9" fill="#155724">Prescriptions, follow-ups, referral</text>

  <line x1="264" y1="385" x2="300" y2="385" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Doc Agent structures P -->
  <rect x="300" y="360" width="210" height="50" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="322" cy="377" r="9" fill="#0070AD"/>
  <circle cx="322" cy="375" r="2.8" fill="white"/>
  <path d="M318,382 Q322,379 326,382" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="420" y="376" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Documentation Agent</text>
  <text x="420" y="390" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Complete SOAP</text>
  <text x="420" y="404" text-anchor="middle" font-size="8" fill="#555">Full note ready for review</text>

  <!-- Live SOAP preview -->
  <rect x="560" y="232" width="240" height="178" rx="8" fill="white" stroke="#0070AD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="680" y="252" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Live SOAP Preview</text>
  <text x="680" y="270" text-anchor="middle" font-size="9" fill="#555">(in Copilot chat)</text>
  <rect x="576" y="280" width="208" height="20" rx="4" fill="#fff3cd" opacity="0.6"/>
  <text x="584" y="294" font-size="9" fill="#664d03" font-weight="600">S:</text>
  <text x="596" y="294" font-size="8" fill="#997a00">From triage (pre-filled)</text>
  <rect x="576" y="304" width="208" height="20" rx="4" fill="#d4edda" opacity="0.6"/>
  <text x="584" y="318" font-size="9" fill="#155724" font-weight="600">O:</text>
  <text x="598" y="318" font-size="8" fill="#155724">Clinician adds findings</text>
  <rect x="576" y="328" width="208" height="20" rx="4" fill="#d4edda" opacity="0.6"/>
  <text x="584" y="342" font-size="9" fill="#155724" font-weight="600">A:</text>
  <text x="598" y="342" font-size="8" fill="#155724">Clinician adds diagnosis</text>
  <rect x="576" y="352" width="208" height="20" rx="4" fill="#d4edda" opacity="0.6"/>
  <text x="584" y="366" font-size="9" fill="#155724" font-weight="600">P:</text>
  <text x="598" y="366" font-size="8" fill="#155724">Clinician adds plan</text>
  <text x="680" y="400" text-anchor="middle" font-size="8" fill="#555" font-style="italic">Structured by Documentation Agent</text>

  <!-- ================================================================ -->
  <!-- PHASE 3: FINALISATION                                            -->
  <!-- ================================================================ -->
  <text x="20" y="440" font-size="11" fill="#6C757D" font-weight="700" letter-spacing="1.5">PHASE 3: FINALISATION</text>
  <line x1="200" y1="436" x2="1084" y2="436" stroke="#ddd" stroke-width="1"/>

  <!-- Clinician reviews -->
  <rect x="20" y="454" width="220" height="46" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="42" cy="477" r="10" fill="none" stroke="#2E8B57" stroke-width="2"/>
  <circle cx="42" cy="474" r="3" fill="#2E8B57"/>
  <path d="M36,483 Q42,479 48,483" fill="none" stroke="#2E8B57" stroke-width="1.3"/>
  <text x="140" y="472" text-anchor="middle" font-size="10" font-weight="700" fill="#155724">Reviews full SOAP</text>
  <text x="140" y="488" text-anchor="middle" font-size="9" fill="#155724">Edits if needed, approves</text>

  <line x1="244" y1="477" x2="280" y2="477" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Doc Agent structures + extracts -->
  <rect x="280" y="454" width="230" height="50" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="302" cy="469" r="9" fill="#0070AD"/>
  <circle cx="302" cy="467" r="2.8" fill="white"/>
  <path d="M298,474 Q302,471 306,474" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="410" y="468" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Documentation Agent</text>
  <text x="410" y="480" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Extract entities</text>
  <text x="410" y="492" text-anchor="middle" font-size="8" fill="#555">Diagnosis, meds, actions, referral flag</text>

  <line x1="514" y1="477" x2="550" y2="477" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Save to Dataverse -->
  <rect x="550" y="454" width="200" height="46" rx="8" fill="#e8e8e8" stroke="#999" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="472" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Save to Dataverse</text>
  <text x="650" y="488" text-anchor="middle" font-size="8" fill="#555">Encounter + entities + audit log</text>

  <!-- Post-save actions -->
  <line x1="754" y1="477" x2="790" y2="477" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Two outputs stacked -->
  <!-- Patient summary email -->
  <rect x="790" y="454" width="290" height="50" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="812" cy="468" r="9" fill="#0070AD"/>
  <circle cx="812" cy="466" r="2.8" fill="white"/>
  <path d="M808,473 Q812,470 816,473" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="945" y="464" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Documentation Agent</text>
  <text x="945" y="476" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Email patient summary</text>
  <text x="945" y="488" text-anchor="middle" font-size="8" fill="#555">Consultation summary + next steps</text>

  <!-- Referral trigger -->
  <rect x="790" y="512" width="290" height="36" rx="8" fill="#e0f7ff" stroke="#00B0F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="935" y="526" text-anchor="middle" font-size="9" font-weight="600" fill="#003A5D">If referral flag &#x2192; Referral Agent</text>
  <text x="935" y="538" text-anchor="middle" font-size="8" fill="#555">Auto-triggers Workflow 3</text>

  <line x1="754" y1="495" x2="786" y2="530" stroke="#00B0F0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ================================================================ -->
  <!-- HUMAN INTERACTION POINTS                                          -->
  <!-- ================================================================ -->
  <rect x="16" y="556" width="1068" height="52" rx="8" fill="white" stroke="#2E8B57" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="36" y="578" font-size="10" font-weight="700" fill="#003A5D">Human-in-the-loop:</text>
  <text x="170" y="578" font-size="9" fill="#444">Clinician writes all clinical content (O, A, P)</text>
  <text x="430" y="578" font-size="9" fill="#444">| Approves final SOAP note</text>
  <text x="600" y="578" font-size="9" fill="#444">| Patient emailed summary</text>
  <text x="36" y="596" font-size="9" fill="#555" font-style="italic">Documentation Agent structures and formats only. Does not add clinical content. Full audit trail.</text>

  <!-- FOOTER -->
  <rect x="0" y="618" width="1100" height="42" fill="url(#footerGrad)"/>
  <rect x="0" y="648" width="1100" height="12" rx="12" fill="url(#footerGrad)"/>
  <text x="20" y="644" fill="white" font-size="10" opacity="0.85" font-weight="600">AgentCare &#x2014; Workflow 2: Consultation &#x26; Documentation</text>
  <text x="1080" y="644" text-anchor="end" fill="white" font-size="9.5" opacity="0.7">Agents structure, clinicians decide. All actions audited.</text>

</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0070AD"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E8B57"/>
    </marker>
  </defs>

  <rect width="1000" height="360" rx="10" fill="#FAFBFC"/>

  <!-- Header -->
  <rect width="1000" height="40" rx="10" fill="#0070AD"/>
  <rect y="30" width="1000" height="10" fill="#0070AD"/>
  <text x="20" y="26" fill="white" font-size="14" font-weight="700">Documentation Agent</text>
  <text x="1000" y="26" text-anchor="end" fill="white" font-size="10" opacity="0.8" font-weight="400" dx="-16">Progressive SOAP building | Pre-filled from triage, enriched during consultation</text>

  <!-- PRE-FILL from Triage -->
  <rect x="20" y="60" width="190" height="80" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2" filter="url(#shadow)"/>
  <text x="115" y="78" text-anchor="middle" font-size="8" font-weight="700" fill="#664d03">PRE-FILLED FROM TRIAGE</text>
  <text x="115" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#664d03">SOAP (S) ready</text>
  <text x="115" y="112" text-anchor="middle" font-size="8" fill="#997a00">Subjective: symptoms,</text>
  <text x="115" y="124" text-anchor="middle" font-size="8" fill="#997a00">history, patient context</text>
  <text x="115" y="136" text-anchor="middle" font-size="7" fill="#997a00">from Dataverse</text>

  <line x1="214" y1="100" x2="242" y2="100" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Clinician adds O + A -->
  <rect x="250" y="60" width="190" height="80" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <text x="345" y="78" text-anchor="middle" font-size="8" font-weight="600" fill="#2E8B57">CLINICIAN INPUT</text>
  <text x="345" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#155724">Adds O + A</text>
  <text x="345" y="112" text-anchor="middle" font-size="8" fill="#155724">Objective: exam findings,</text>
  <text x="345" y="124" text-anchor="middle" font-size="8" fill="#155724">vitals, observations</text>
  <text x="345" y="136" text-anchor="middle" font-size="8" fill="#155724">Assessment: diagnosis</text>

  <line x1="444" y1="100" x2="472" y2="100" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CDS validates (parallel) -->
  <rect x="480" y="60" width="190" height="80" rx="8" fill="#e0f7ff" stroke="#00B0F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="575" y="78" text-anchor="middle" font-size="8" font-weight="600" fill="#005a8c">CDS AGENT (real-time)</text>
  <text x="575" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Validates + Enriches</text>
  <text x="575" y="112" text-anchor="middle" font-size="8" fill="#555">Drug interaction checks,</text>
  <text x="575" y="124" text-anchor="middle" font-size="8" fill="#555">guideline matching,</text>
  <text x="575" y="136" text-anchor="middle" font-size="8" fill="#555">flags gaps or alerts</text>

  <line x1="674" y1="100" x2="702" y2="100" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Clinician finalises Plan -->
  <rect x="710" y="60" width="270" height="80" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <text x="845" y="78" text-anchor="middle" font-size="8" font-weight="600" fill="#2E8B57">CLINICIAN FINALISES</text>
  <text x="845" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#155724">Reviews SOAP + CDS alerts</text>
  <text x="845" y="112" text-anchor="middle" font-size="8" fill="#155724">Accepts/dismisses CDS recommendations</text>
  <text x="845" y="124" text-anchor="middle" font-size="8" fill="#155724">Adds Plan (P): prescriptions, follow-ups</text>
  <text x="845" y="136" text-anchor="middle" font-size="8" fill="#155724">Approves final SOAP note</text>

  <!-- Arrow down to structuring -->
  <line x1="845" y1="144" x2="845" y2="172" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Prompt action: structure + extract -->
  <rect x="580" y="180" width="400" height="60" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="780" y="198" text-anchor="middle" font-size="8" font-weight="600" fill="#0070AD">PROMPT ACTION</text>
  <text x="780" y="216" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Structure Final Note + Extract Entities</text>
  <text x="780" y="232" text-anchor="middle" font-size="8" fill="#555">SNOMED codes, medication list, follow-up actions, referral triggers</text>

  <!-- Arrow to outputs -->
  <line x1="780" y1="244" x2="780" y2="268" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Outputs row -->
  <rect x="20" y="176" width="200" height="68" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="196" text-anchor="middle" font-size="8" font-weight="600" fill="#666">SOAP NOTE STRUCTURE</text>
  <text x="120" y="214" text-anchor="middle" font-size="9" fill="#333"><tspan font-weight="600">S</tspan> from triage</text>
  <text x="120" y="228" text-anchor="middle" font-size="9" fill="#333"><tspan font-weight="600">O + A</tspan> from clinician</text>
  <text x="120" y="242" text-anchor="middle" font-size="9" fill="#333"><tspan font-weight="600">P</tspan> from clinician + CDS</text>

  <!-- Output: Dataverse -->
  <rect x="580" y="274" width="400" height="50" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="2"/>
  <text x="780" y="294" text-anchor="middle" font-size="8" font-weight="600" fill="#666">OUTPUT &#x2192; DATAVERSE</text>
  <text x="780" y="310" text-anchor="middle" font-size="9" fill="#333">Structured encounter + extracted entities + CDS decisions + audit log</text>

  <!-- Triggers downstream -->
  <rect x="20" y="274" width="200" height="50" rx="8" fill="#e0f7ff" stroke="#00B0F0" stroke-width="2"/>
  <text x="120" y="294" text-anchor="middle" font-size="8" font-weight="600" fill="#005a8c">TRIGGERS DOWNSTREAM</text>
  <text x="120" y="310" text-anchor="middle" font-size="9" font-weight="600" fill="#003A5D">Referral Agent (if needed)</text>

  <line x1="224" y1="299" x2="576" y2="299" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Key constraint -->
  <rect x="20" y="338" width="960" height="16" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="500" y="350" text-anchor="middle" font-size="8" fill="#555">Nothing saved without clinician approval. CDS annotations are advisory. Full audit trail of all decisions.</text>
</svg>
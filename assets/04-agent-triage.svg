<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0070AD"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc3333"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E8B57"/>
    </marker>
  </defs>

  <rect width="1000" height="360" rx="10" fill="#FAFBFC"/>

  <!-- Header -->
  <rect width="1000" height="40" rx="10" fill="#0070AD"/>
  <rect y="30" width="1000" height="10" fill="#0070AD"/>
  <text x="20" y="26" fill="white" font-size="14" font-weight="700">Triage Agent</text>
  <text x="1000" y="26" text-anchor="end" fill="white" font-size="10" opacity="0.8" font-weight="400" dx="-16">Patient-facing chatbot | Entry point for the entire workflow</text>

  <!-- Input -->
  <rect x="20" y="70" width="130" height="70" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="90" text-anchor="middle" font-size="9" font-weight="700" fill="#664d03">INPUT</text>
  <text x="85" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#664d03">Patient Message</text>
  <text x="85" y="124" text-anchor="middle" font-size="8" fill="#997a00">Via web/mobile</text>
  <text x="85" y="136" text-anchor="middle" font-size="8" fill="#997a00">chatbot</text>

  <line x1="154" y1="105" x2="182" y2="105" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 1: History lookup -->
  <rect x="190" y="70" width="150" height="70" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="265" y="90" text-anchor="middle" font-size="8" font-weight="600" fill="#0070AD">DATAVERSE QUERY</text>
  <text x="265" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Patient History</text>
  <text x="265" y="124" text-anchor="middle" font-size="8" fill="#555">Existing conditions,</text>
  <text x="265" y="136" text-anchor="middle" font-size="8" fill="#555">medications, allergies</text>

  <line x1="344" y1="105" x2="372" y2="105" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Symptom collection -->
  <rect x="380" y="70" width="150" height="70" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="455" y="90" text-anchor="middle" font-size="8" font-weight="600" fill="#0070AD">COPILOT STUDIO TOPIC</text>
  <text x="455" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Symptom Collection</text>
  <text x="455" y="124" text-anchor="middle" font-size="8" fill="#555">Guided questions,</text>
  <text x="455" y="136" text-anchor="middle" font-size="8" fill="#555">plain language</text>

  <line x1="534" y1="105" x2="562" y2="105" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Urgency classification -->
  <rect x="570" y="70" width="150" height="70" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="645" y="90" text-anchor="middle" font-size="8" font-weight="600" fill="#0070AD">PROMPT ACTION</text>
  <text x="645" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Classify Urgency</text>
  <text x="645" y="124" text-anchor="middle" font-size="8" fill="#555">Symptoms + history</text>
  <text x="645" y="136" text-anchor="middle" font-size="8" fill="#555">&#x2192; urgency level</text>

  <!-- Decision diamond -->
  <line x1="724" y1="105" x2="752" y2="105" stroke="#0070AD" stroke-width="2"/>
  <polygon points="790,75 825,105 790,135 755,105" fill="#fff8e6" stroke="#E8912D" stroke-width="2"/>
  <text x="790" y="103" text-anchor="middle" font-size="8" font-weight="600" fill="#8B5E00">Urgency</text>
  <text x="790" y="113" text-anchor="middle" font-size="8" font-weight="600" fill="#8B5E00">level?</text>

  <!-- Emergency (up) -->
  <line x1="790" y1="75" x2="790" y2="60" stroke="#cc3333" stroke-width="2"/>
  <line x1="790" y1="60" x2="852" y2="60" stroke="#cc3333" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="860" y="46" width="120" height="30" rx="6" fill="#fde8e8" stroke="#cc3333" stroke-width="1.5"/>
  <text x="920" y="66" text-anchor="middle" font-size="9" font-weight="700" fill="#cc3333">Call 999</text>

  <!-- Urgent / Routine (right) -->
  <line x1="829" y1="105" x2="857" y2="105" stroke="#E8912D" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="860" y="88" width="120" height="34" rx="6" fill="#fef3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="920" y="104" text-anchor="middle" font-size="9" font-weight="600" fill="#664d03">See GP</text>
  <text x="920" y="116" text-anchor="middle" font-size="8" fill="#997a00">Urgent / Routine</text>

  <!-- Self-care (down) -->
  <line x1="790" y1="139" x2="790" y2="152" stroke="#2E8B57" stroke-width="2"/>
  <line x1="790" y1="152" x2="857" y2="152" stroke="#2E8B57" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="860" y="138" width="120" height="30" rx="6" fill="#d4edda" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="920" y="158" text-anchor="middle" font-size="9" font-weight="600" fill="#155724">Self-care advice</text>

  <!-- OUTPUT: Dataverse -->
  <rect x="20" y="190" width="960" height="70" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="212" text-anchor="middle" font-size="10" font-weight="700" fill="#333">OUTPUT &#x2192; DATAVERSE (seeds the consultation)</text>
  <text x="145" y="238" text-anchor="middle" font-size="9" fill="#555"><tspan font-weight="600">Triage Record:</tspan> symptoms,</text>
  <text x="145" y="252" text-anchor="middle" font-size="9" fill="#555">urgency, outcome</text>
  <text x="380" y="238" text-anchor="middle" font-size="9" fill="#555"><tspan font-weight="600">Pre-filled SOAP (S):</tspan> patient-reported</text>
  <text x="380" y="252" text-anchor="middle" font-size="9" fill="#555">symptoms structured as Subjective</text>
  <text x="640" y="238" text-anchor="middle" font-size="9" fill="#555"><tspan font-weight="600">Patient context:</tspan> history, meds,</text>
  <text x="640" y="252" text-anchor="middle" font-size="9" fill="#555">allergies ready for clinician</text>
  <text x="870" y="238" text-anchor="middle" font-size="9" fill="#555"><tspan font-weight="600">CDS pre-loaded:</tspan> initial</text>
  <text x="870" y="252" text-anchor="middle" font-size="9" fill="#555">guideline matches queued</text>

  <line x1="455" y1="144" x2="455" y2="186" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Data context -->
  <rect x="20" y="280" width="960" height="60" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="36" y="302" font-size="9" font-weight="700" fill="#003A5D">Dataverse tables:</text>
  <text x="160" y="302" font-size="9" fill="#555">Patients (read) | Triage Records (write) | Encounters (write - pre-fill SOAP) | Audit Log (write)</text>
  <text x="36" y="322" font-size="9" font-weight="700" fill="#003A5D">Key design:</text>
  <text x="160" y="322" font-size="9" fill="#555">Triage data flows directly into consultation. No double data entry. Emergency always directs to 999.</text>
</svg>
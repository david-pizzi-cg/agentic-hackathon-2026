<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0070AD"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E8B57"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003A5D"/>
      <stop offset="100%" stop-color="#0070AD"/>
    </linearGradient>
    <linearGradient id="footerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0070AD"/>
      <stop offset="100%" stop-color="#003A5D"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="500" rx="12" fill="#F7F8FA"/>

  <!-- HEADER -->
  <rect width="1100" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect y="40" width="1100" height="12" fill="url(#headerGrad)"/>
  <text x="20" y="22" fill="white" font-size="10" font-weight="400" letter-spacing="1.5" opacity="0.85">CASE OVERVIEW | Healthcare</text>
  <text x="20" y="42" fill="white" font-size="16" font-weight="700">Workflow 3: Referral Drafting &#x26; Submission</text>
  <text x="1080" y="36" text-anchor="end" fill="white" font-size="10" opacity="0.7">Auto-triggered from SOAP note</text>

  <!-- LEGEND -->
  <rect x="16" y="62" width="1068" height="28" rx="6" fill="white" filter="url(#shadowSm)"/>
  <rect x="28" y="69" width="14" height="14" rx="3" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="48" y="81" font-size="9" fill="#555">Trigger</text>
  <circle cx="110" cy="76" r="7" fill="#0070AD"/>
  <text x="122" y="81" font-size="9" fill="#555">Referral Agent</text>
  <circle cx="220" cy="76" r="7" fill="none" stroke="#2E8B57" stroke-width="1.8"/>
  <text x="232" y="81" font-size="9" fill="#555">Clinician action</text>
  <rect x="335" y="69" width="14" height="14" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="355" y="81" font-size="9" fill="#555">Output / Dataverse</text>

  <!-- ================================================================ -->
  <!-- MAIN FLOW                                                        -->
  <!-- ================================================================ -->
  <text x="20" y="116" font-size="11" fill="#6C757D" font-weight="700" letter-spacing="1.5">REFERRAL CHAIN (auto-triggered after consultation)</text>
  <line x1="420" y1="112" x2="1084" y2="112" stroke="#ddd" stroke-width="1"/>

  <!-- 1. Trigger: SOAP saved with referral flag -->
  <rect x="20" y="130" width="180" height="56" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="148" text-anchor="middle" font-size="8" font-weight="700" fill="#664d03">TRIGGER</text>
  <text x="110" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#664d03">SOAP note saved</text>
  <text x="110" y="178" text-anchor="middle" font-size="8" fill="#997a00">Referral flag detected in Plan</text>

  <line x1="204" y1="158" x2="240" y2="158" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. Referral Agent drafts letter -->
  <rect x="240" y="130" width="220" height="56" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="262" cy="150" r="9" fill="#0070AD"/>
  <circle cx="262" cy="148" r="2.8" fill="white"/>
  <path d="M258,155 Q262,152 266,155" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="365" y="148" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Referral Agent</text>
  <text x="365" y="164" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Draft referral letter</text>
  <text x="365" y="180" text-anchor="middle" font-size="8" fill="#555">From SOAP + patient record</text>

  <line x1="464" y1="158" x2="500" y2="158" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Validate completeness -->
  <rect x="500" y="130" width="200" height="56" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="522" cy="150" r="9" fill="#0070AD"/>
  <circle cx="522" cy="148" r="2.8" fill="white"/>
  <path d="M518,155 Q522,152 526,155" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="615" y="148" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Referral Agent</text>
  <text x="615" y="164" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Validate completeness</text>
  <text x="615" y="180" text-anchor="middle" font-size="8" fill="#555">Required fields checked</text>

  <line x1="704" y1="158" x2="740" y2="158" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. Clinician reviews and approves -->
  <rect x="740" y="130" width="340" height="56" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="762" cy="158" r="10" fill="none" stroke="#2E8B57" stroke-width="2"/>
  <circle cx="762" cy="155" r="3" fill="#2E8B57"/>
  <path d="M756,164 Q762,160 768,164" fill="none" stroke="#2E8B57" stroke-width="1.3"/>
  <text x="910" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#155724">Clinician reviews draft in Copilot chat</text>
  <text x="910" y="166" text-anchor="middle" font-size="9" fill="#155724">Edits if needed, approves</text>
  <text x="910" y="180" text-anchor="middle" font-size="8" fill="#2E8B57">Only human step in the chain</text>

  <!-- Arrow down from clinician approval -->
  <line x1="910" y1="190" x2="910" y2="210" stroke="#2E8B57" stroke-width="2"/>
  <line x1="910" y1="210" x2="110" y2="210" stroke="#2E8B57" stroke-width="2"/>
  <line x1="110" y1="210" x2="110" y2="230" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ROW 2: Send + Notify (clean left to right) -->
  <!-- 5. Send letter -->
  <rect x="20" y="230" width="240" height="50" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="42" cy="248" r="9" fill="#0070AD"/>
  <circle cx="42" cy="246" r="2.8" fill="white"/>
  <path d="M38,253 Q42,250 46,253" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="150" y="244" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Referral Agent</text>
  <text x="150" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Send letter via Outlook</text>
  <text x="150" y="270" text-anchor="middle" font-size="8" fill="#555">To specialist</text>

  <line x1="264" y1="253" x2="300" y2="253" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Email to specialist -->
  <rect x="300" y="230" width="180" height="50" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="322" cy="248" r="9" fill="#0070AD"/>
  <circle cx="322" cy="246" r="2.8" fill="white"/>
  <path d="M318,253 Q322,250 326,253" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="405" y="244" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Referral Agent</text>
  <text x="405" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Email to specialist</text>
  <text x="405" y="270" text-anchor="middle" font-size="8" fill="#555">Referral letter attached</text>

  <line x1="484" y1="253" x2="520" y2="253" stroke="#0070AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6. Notify patient -->
  <rect x="520" y="230" width="240" height="50" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="542" cy="248" r="9" fill="#0070AD"/>
  <circle cx="542" cy="246" r="2.8" fill="white"/>
  <path d="M538,253 Q542,250 546,253" fill="none" stroke="white" stroke-width="1.2"/>
  <text x="655" y="244" text-anchor="middle" font-size="8" font-weight="500" fill="#555">Referral Agent</text>
  <text x="655" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#003A5D">Email to patient</text>
  <text x="655" y="270" text-anchor="middle" font-size="8" fill="#555">Referral confirmation</text>

  <!-- Connector down to Dataverse from entire row -->
  <line x1="140" y1="284" x2="140" y2="304" stroke="#999" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="400" y1="284" x2="400" y2="304" stroke="#999" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="640" y1="284" x2="640" y2="304" stroke="#999" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ROW 3: Save to Dataverse -->
  <rect x="20" y="304" width="740" height="56" rx="8" fill="#e8e8e8" stroke="#999" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Saved to Dataverse</text>
  <text x="120" y="340" text-anchor="middle" font-size="8" fill="#555">Referral letter</text>
  <text x="300" y="340" text-anchor="middle" font-size="8" fill="#555">Referral record (status, specialist, dates)</text>
  <text x="510" y="340" text-anchor="middle" font-size="8" fill="#555">Clinician approval</text>
  <text x="680" y="340" text-anchor="middle" font-size="8" fill="#555">Audit trail</text>
  <text x="200" y="340" text-anchor="middle" font-size="8" fill="#999">|</text>
  <text x="410" y="340" text-anchor="middle" font-size="8" fill="#999">|</text>
  <text x="600" y="340" text-anchor="middle" font-size="8" fill="#999">|</text>

  <!-- ================================================================ -->
  <!-- HUMAN INTERACTION POINTS                                          -->
  <!-- ================================================================ -->
  <rect x="16" y="380" width="1068" height="68" rx="8" fill="white" stroke="#2E8B57" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="36" y="402" font-size="10" font-weight="700" fill="#003A5D">Human-in-the-loop:</text>
  <text x="170" y="402" font-size="9" fill="#444">Clinician reviews and approves referral draft (one step)</text>
  <text x="36" y="422" font-size="10" font-weight="700" fill="#003A5D">Automated:</text>
  <text x="130" y="422" font-size="9" fill="#444">Letter drafting, completeness validation, sending via Outlook, patient email notification, Dataverse logging</text>
  <text x="36" y="438" font-size="9" fill="#555" font-style="italic">Entire chain is triggered automatically when SOAP note contains a referral decision. Clinician only reviews the draft.</text>

  <!-- FOOTER -->
  <rect x="0" y="460" width="1100" height="40" fill="url(#footerGrad)"/>
  <rect x="0" y="488" width="1100" height="12" rx="12" fill="url(#footerGrad)"/>
  <text x="20" y="484" fill="white" font-size="10" opacity="0.85" font-weight="600">AgentCare &#x2014; Workflow 3: Referral Drafting &#x26; Submission</text>
  <text x="1080" y="484" text-anchor="end" fill="white" font-size="9.5" opacity="0.7">Auto-triggered, clinician-approved. All actions audited.</text>

</svg>
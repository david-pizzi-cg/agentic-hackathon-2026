<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <filter id="glowBlue" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00B0F0" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0070AD"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E8B57"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D9534F"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003A5D"/>
      <stop offset="100%" stop-color="#0070AD"/>
    </linearGradient>
    <linearGradient id="footerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0070AD"/>
      <stop offset="100%" stop-color="#003A5D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" rx="12" fill="#F7F8FA"/>

  <!-- ===== HEADER BAR ===== -->
  <rect width="1100" height="54" rx="12" fill="url(#headerGrad)"/>
  <rect y="42" width="1100" height="12" fill="url(#headerGrad)"/>
  <text x="20" y="34" fill="white" font-size="11" font-weight="600" letter-spacing="1.5" opacity="0.85">CASE OVERVIEW | Healthcare</text>
  <text x="1080" y="34" text-anchor="end" fill="white" font-size="16" font-weight="700">Workflow 3: Post-Consultation Review &amp; Missed Referral Catch</text>

  <!-- ============================================================ -->
  <!-- ROW 1: TRIGGER + CDS AGENT BLOCK (y ~ 72)                   -->
  <!-- ============================================================ -->

  <!-- 1. TRIGGER: Clinical notes finalised -->
  <rect x="20" y="72" width="115" height="52" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2" filter="url(#shadow)"/>
  <text x="77" y="93" text-anchor="middle" font-size="10" font-weight="700" fill="#664d03">TRIGGER</text>
  <text x="77" y="108" text-anchor="middle" font-size="9" fill="#664d03">Notes finalised</text>

  <!-- Arrow: Trigger -> CDS Agent -->
  <line x1="135" y1="98" x2="168" y2="98" stroke="#0070AD" stroke-width="2"/>

  <!-- 2. CDS AGENT (highlighted block with CORE badge + glow) -->
  <rect x="170" y="66" width="310" height="118" rx="10" fill="#e0f7ff" stroke="#00B0F0" stroke-width="3" filter="url(#glowBlue)"/>
  <!-- CORE badge -->
  <rect x="400" y="58" width="52" height="18" rx="9" fill="#00B0F0"/>
  <text x="426" y="70" text-anchor="middle" font-size="9" font-weight="700" fill="white">CORE</text>
  <!-- Agent icon (dark circle with robot silhouette) -->
  <circle cx="195" cy="88" r="12" fill="#003A5D"/>
  <circle cx="195" cy="84" r="4" fill="#e0f7ff"/>
  <rect x="189" y="90" width="12" height="7" rx="2" fill="#e0f7ff"/>
  <!-- Agent label -->
  <text x="215" y="90" font-size="12" font-weight="700" fill="#003A5D">CDS Agent</text>
  <text x="215" y="105" font-size="9" fill="#444">&#x2022; Async review of encounter notes</text>
  <text x="215" y="117" font-size="9" fill="#444">&#x2022; Compare against NICE guideline pathways</text>
  <text x="215" y="129" font-size="9" fill="#444">&#x2022; Check referral criteria met but not actioned</text>
  <text x="215" y="141" font-size="9" fill="#444">&#x2022; Check missing follow-up actions</text>
  <text x="215" y="153" font-size="9" fill="#444">&#x2022; Assess confidence level of gap detection</text>

  <!-- Arrow: CDS Agent -> Decision diamond -->
  <line x1="480" y1="125" x2="518" y2="125" stroke="#0070AD" stroke-width="2"/>

  <!-- 3. DECISION: Gap detected? (diamond) -->
  <polygon points="560,95 600,125 560,155 520,125" fill="white" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="122" text-anchor="middle" font-size="9" font-weight="700" fill="#003A5D">Gap</text>
  <text x="560" y="133" text-anchor="middle" font-size="9" font-weight="700" fill="#003A5D">found?</text>

  <!-- NO path: Decision -> Compliant (down) -->
  <line x1="560" y1="155" x2="560" y2="185" stroke="#2E8B57" stroke-width="2"/>
  <text x="572" y="175" font-size="9" font-weight="600" fill="#2E8B57">NO</text>
  <!-- Compliant box -->
  <rect x="510" y="187" width="100" height="38" rx="6" fill="#d4edda" stroke="#2E8B57" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="560" y="205" text-anchor="middle" font-size="9" font-weight="600" fill="#155724">Log "compliant"</text>
  <text x="560" y="217" text-anchor="middle" font-size="9" fill="#155724">status</text>
  <!-- Compliant -> End -->
  <line x1="610" y1="206" x2="640" y2="206" stroke="#2E8B57" stroke-width="2"/>
  <rect x="642" y="192" width="50" height="28" rx="14" fill="#2E8B57"/>
  <text x="667" y="210" text-anchor="middle" font-size="9" font-weight="700" fill="white">END</text>

  <!-- YES path: Decision -> Alert (right) -->
  <line x1="600" y1="125" x2="638" y2="125" stroke="#D9534F" stroke-width="2"/>
  <text x="614" y="119" font-size="9" font-weight="600" fill="#D9534F">YES</text>

  <!-- 4. ALERT: Gap found -->
  <rect x="640" y="80" width="195" height="90" rx="8" fill="#fde8e8" stroke="#D9534F" stroke-width="2" filter="url(#shadow)"/>
  <text x="737" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#721c24">Alert: Gap Found</text>
  <text x="737" y="113" text-anchor="middle" font-size="9" fill="#721c24">Referral pathway may be indicated</text>
  <line x1="655" y1="120" x2="820" y2="120" stroke="#D9534F" stroke-width="0.5" opacity="0.4"/>
  <text x="655" y="134" font-size="8" fill="#994444">Guideline reference</text>
  <text x="655" y="146" font-size="8" fill="#994444">Patient data points</text>
  <text x="655" y="158" font-size="8" fill="#994444">Confidence score</text>

  <!-- Arrow: Alert -> Clinician reviews (down to row 2) -->
  <line x1="737" y1="170" x2="737" y2="238" stroke="#0070AD" stroke-width="2"/>

  <!-- ============================================================ -->
  <!-- ROW 2: CLINICIAN REVIEW + DISMISS BRANCH (y ~ 240)          -->
  <!-- ============================================================ -->

  <!-- 5. HUMAN: Clinician reviews alert -->
  <rect x="640" y="240" width="195" height="60" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <!-- Human icon (person with blue outline ring) -->
  <circle cx="665" cy="262" r="12" fill="none" stroke="#0070AD" stroke-width="2"/>
  <circle cx="665" cy="258" r="4" fill="#2E8B57"/>
  <path d="M658,269 Q665,264 672,269" fill="none" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="685" y="264" font-size="11" font-weight="600" fill="#155724">Clinician Reviews</text>
  <text x="685" y="278" font-size="9" fill="#155724">Alert with evidence</text>
  <!-- HUMAN label -->
  <rect x="806" y="244" width="50" height="16" rx="8" fill="#2E8B57"/>
  <text x="831" y="255" text-anchor="middle" font-size="8" font-weight="700" fill="white">HUMAN</text>

  <!-- Arrow: Clinician -> Decision (Agree/Dismiss) -->
  <line x1="737" y1="300" x2="737" y2="330" stroke="#0070AD" stroke-width="2"/>

  <!-- DECISION: Agree / Dismiss -->
  <polygon points="737,330 777,360 737,390 697,360" fill="white" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="737" y="357" text-anchor="middle" font-size="8" font-weight="700" fill="#003A5D">Agree /</text>
  <text x="737" y="368" text-anchor="middle" font-size="8" font-weight="700" fill="#003A5D">Dismiss?</text>

  <!-- DISMISS path (right) -->
  <line x1="777" y1="360" x2="870" y2="360" stroke="#D9534F" stroke-width="2"/>
  <text x="810" y="353" font-size="9" font-weight="600" fill="#D9534F">Dismiss</text>
  <!-- Log reason box -->
  <rect x="872" y="340" width="120" height="42" rx="6" fill="#fde8e8" stroke="#D9534F" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="932" y="357" text-anchor="middle" font-size="9" font-weight="600" fill="#721c24">Log reason</text>
  <text x="932" y="370" text-anchor="middle" font-size="8" fill="#994444">(mandatory for audit)</text>
  <!-- Log reason -> End -->
  <line x1="992" y1="361" x2="1025" y2="361" stroke="#D9534F" stroke-width="2"/>
  <rect x="1027" y="347" width="50" height="28" rx="14" fill="#D9534F"/>
  <text x="1052" y="365" text-anchor="middle" font-size="9" font-weight="700" fill="white">END</text>

  <!-- AGREE path (down, label only - line drawn below with routing) -->
  <text x="750" y="400" font-size="9" font-weight="600" fill="#2E8B57">Agree</text>

  <!-- ============================================================ -->
  <!-- ROW 3: REFERRAL AGENT + APPROVE + COMMS (y ~ 420)           -->
  <!-- ============================================================ -->

  <!-- 6. REFERRAL AGENT -->
  <rect x="170" y="422" width="230" height="68" rx="10" fill="#E8F4FA" stroke="#0070AD" stroke-width="2.5" filter="url(#shadow)"/>
  <!-- Agent icon -->
  <circle cx="195" cy="448" r="12" fill="#003A5D"/>
  <circle cx="195" cy="444" r="4" fill="#E8F4FA"/>
  <rect x="189" y="450" width="12" height="7" rx="2" fill="#E8F4FA"/>
  <text x="215" y="448" font-size="11" font-weight="700" fill="#003A5D">Referral Agent</text>
  <text x="215" y="462" font-size="9" fill="#444">&#x2022; Draft referral letter (pre-populated)</text>
  <text x="215" y="474" font-size="9" fill="#444">&#x2022; Attach clinical data + suggest specialist</text>

  <!-- Arrow: Agree down -> left to Referral Agent -->
  <line x1="737" y1="390" x2="737" y2="408" stroke="#2E8B57" stroke-width="2"/>
  <line x1="737" y1="408" x2="285" y2="408" stroke="#0070AD" stroke-width="2"/>
  <line x1="285" y1="408" x2="285" y2="420" stroke="#0070AD" stroke-width="2"/>

  <!-- Arrow: Referral Agent -> Clinician approves -->
  <line x1="400" y1="456" x2="490" y2="456" stroke="#0070AD" stroke-width="2"/>

  <!-- 7. HUMAN: Clinician approves letter -->
  <rect x="492" y="432" width="175" height="50" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="517" cy="452" r="12" fill="none" stroke="#0070AD" stroke-width="2"/>
  <circle cx="517" cy="448" r="4" fill="#2E8B57"/>
  <path d="M510,459 Q517,454 524,459" fill="none" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="537" y="453" font-size="10" font-weight="600" fill="#155724">Clinician Approves</text>
  <text x="537" y="467" font-size="9" fill="#155724">Review referral letter</text>
  <rect x="638" y="434" width="50" height="16" rx="8" fill="#2E8B57"/>
  <text x="663" y="445" text-anchor="middle" font-size="8" font-weight="700" fill="white">HUMAN</text>

  <!-- Arrow: Approve -> Communication block -->
  <line x1="667" y1="457" x2="710" y2="457" stroke="#0070AD" stroke-width="2"/>

  <!-- 8. COMMUNICATION BLOCK -->
  <rect x="712" y="422" width="195" height="70" rx="8" fill="#e8e8e8" stroke="#999" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="809" y="441" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Communication</text>
  <line x1="722" y1="447" x2="897" y2="447" stroke="#bbb" stroke-width="0.5"/>
  <text x="722" y="461" font-size="9" fill="#555">&#x2192; Referral sent to specialist</text>
  <text x="722" y="473" font-size="9" fill="#555">&#x2192; Patient notified</text>
  <text x="722" y="485" font-size="9" fill="#555">&#x2192; Status tracking (Power Automate)</text>

  <!-- Arrow: Communication -> End -->
  <line x1="907" y1="457" x2="945" y2="457" stroke="#0070AD" stroke-width="2"/>
  <rect x="947" y="443" width="50" height="28" rx="14" fill="#0070AD"/>
  <text x="972" y="461" text-anchor="middle" font-size="9" font-weight="700" fill="white">END</text>

  <!-- ============================================================ -->
  <!-- 9. AUDIT TRAIL BAR                                           -->
  <!-- ============================================================ -->
  <rect x="20" y="510" width="1060" height="38" rx="6" fill="#f0f2f5" stroke="#ddd" stroke-width="1"/>
  <text x="36" y="534" font-size="11" fill="#6C757D" font-weight="700">AUDIT TRAIL</text>
  <text x="145" y="534" font-size="9" fill="#888">Every action logged: agent ID | action type | clinician decision | timestamp &#x2014; persists independently of agent availability</text>

  <!-- ============================================================ -->
  <!-- HUMAN INTERACTION POINTS                                     -->
  <!-- ============================================================ -->
  <rect x="20" y="560" width="1060" height="100" rx="8" fill="white" stroke="#2E8B57" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="36" y="582" font-size="12" font-weight="700" fill="#003A5D">Human Interaction Points</text>

  <text x="36" y="604" font-size="12" fill="#2E8B57">&#x2705;</text>
  <text x="56" y="604" font-size="10" fill="#444">Agent cannot initiate a referral autonomously &#x2014; clinician must explicitly agree to proceed</text>

  <text x="36" y="623" font-size="12" fill="#2E8B57">&#x2705;</text>
  <text x="56" y="623" font-size="10" fill="#444">Dismissals require a mandatory logged reason for audit trail compliance</text>

  <text x="36" y="642" font-size="12" fill="#2E8B57">&#x2705;</text>
  <text x="56" y="642" font-size="10" fill="#444">Clinician reviews and approves referral letter before it is sent to specialist or patient</text>

  <!-- ============================================================ -->
  <!-- LEGEND                                                       -->
  <!-- ============================================================ -->
  <rect x="20" y="670" width="1060" height="30" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="36" y="690" font-size="9" font-weight="700" fill="#003A5D">LEGEND:</text>
  <!-- Agent icon -->
  <circle cx="100" cy="685" r="7" fill="#003A5D"/>
  <text x="112" y="689" font-size="9" fill="#555">AI Agent</text>
  <!-- Human icon -->
  <circle cx="175" cy="685" r="7" fill="none" stroke="#0070AD" stroke-width="1.5"/>
  <circle cx="175" cy="683" r="2.5" fill="#2E8B57"/>
  <text x="187" y="689" font-size="9" fill="#555">Human-in-the-loop</text>
  <!-- Decision -->
  <polygon points="298,679 308,685 298,691 288,685" fill="white" stroke="#0070AD" stroke-width="1.5"/>
  <text x="315" y="689" font-size="9" fill="#555">Decision</text>
  <!-- Alert -->
  <rect x="370" y="679" width="14" height="12" rx="2" fill="#fde8e8" stroke="#D9534F" stroke-width="1"/>
  <text x="390" y="689" font-size="9" fill="#555">Alert</text>
  <!-- Output -->
  <rect x="430" y="679" width="14" height="12" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="450" y="689" font-size="9" fill="#555">Output</text>
  <!-- Green path -->
  <line x1="500" y1="685" x2="525" y2="685" stroke="#2E8B57" stroke-width="2"/>
  <text x="530" y="689" font-size="9" fill="#555">Compliant path</text>
  <!-- Red path -->
  <line x1="615" y1="685" x2="640" y2="685" stroke="#D9534F" stroke-width="2"/>
  <text x="645" y="689" font-size="9" fill="#555">Dismiss path</text>
  <!-- Blue path -->
  <line x1="720" y1="685" x2="745" y2="685" stroke="#0070AD" stroke-width="2"/>
  <text x="750" y="689" font-size="9" fill="#555">Agent flow</text>
  <!-- CORE badge -->
  <rect x="820" y="679" width="36" height="14" rx="7" fill="#00B0F0"/>
  <text x="838" y="690" text-anchor="middle" font-size="8" font-weight="700" fill="white">CORE</text>
  <text x="862" y="689" font-size="9" fill="#555">Differentiator</text>

  <!-- ===== FOOTER BAR ===== -->
  <rect y="706" width="1100" height="14" rx="0" fill="url(#footerGrad)"/>
  <text x="550" y="716" text-anchor="middle" fill="white" font-size="8" opacity="0.8">AgentCare &#x2014; Clinical Safety Net for Missed Referrals &#x2014; Core Differentiator</text>

</svg>
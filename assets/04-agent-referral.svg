<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0070AD"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E8912D"/>
    </marker>
  </defs>

  <rect width="1000" height="480" rx="10" fill="#FAFBFC"/>

  <!-- Header -->
  <rect width="1000" height="40" rx="10" fill="#0070AD"/>
  <rect y="30" width="1000" height="10" fill="#0070AD"/>
  <text x="20" y="26" fill="white" font-size="14" font-weight="700">Referral Agent</text>
  <text x="1000" y="26" text-anchor="end" fill="white" font-size="10" opacity="0.8" font-weight="400" dx="-16">Copilot Studio (letter gen) + Power Automate (missed referral, tracking)</text>

  <!-- LETTER GENERATION SECTION -->
  <text x="20" y="66" font-size="10" font-weight="700" fill="#003A5D" letter-spacing="1">REFERRAL LETTER GENERATION (Copilot Studio)</text>
  <line x1="370" y1="62" x2="980" y2="62" stroke="#ddd" stroke-width="1"/>

  <!-- Input -->
  <rect x="20" y="78" width="130" height="60" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="96" text-anchor="middle" font-size="9" font-weight="700" fill="#664d03">INPUT</text>
  <text x="85" y="112" text-anchor="middle" font-size="9" font-weight="600" fill="#664d03">Finalised SOAP</text>
  <text x="85" y="126" text-anchor="middle" font-size="8" fill="#997a00">+ CDS referral flag</text>

  <line x1="154" y1="108" x2="182" y2="108" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 1: Gather data -->
  <rect x="190" y="78" width="155" height="60" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="267" y="96" text-anchor="middle" font-size="8" font-weight="600" fill="#0070AD">DATAVERSE QUERY</text>
  <text x="267" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Gather Context</text>
  <text x="267" y="126" text-anchor="middle" font-size="8" fill="#555">Patient + encounter + meds</text>

  <line x1="349" y1="108" x2="377" y2="108" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Generate letter -->
  <rect x="385" y="78" width="160" height="60" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="96" text-anchor="middle" font-size="8" font-weight="600" fill="#0070AD">PROMPT ACTION</text>
  <text x="465" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Generate Letter</text>
  <text x="465" y="126" text-anchor="middle" font-size="8" fill="#555">History, Dx, reason, urgency</text>

  <line x1="549" y1="108" x2="577" y2="108" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Clinician review -->
  <rect x="585" y="78" width="155" height="60" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="2" filter="url(#shadow)"/>
  <text x="662" y="96" text-anchor="middle" font-size="8" font-weight="600" fill="#2E8B57">HUMAN DECISION</text>
  <text x="662" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#155724">Clinician Review</text>
  <text x="662" y="126" text-anchor="middle" font-size="8" fill="#155724">Edit / Approve / Reject</text>

  <line x1="744" y1="108" x2="772" y2="108" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output: Save referral -->
  <rect x="780" y="78" width="200" height="60" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="2" filter="url(#shadow)"/>
  <text x="880" y="96" text-anchor="middle" font-size="8" font-weight="600" fill="#666">OUTPUT &#x2192; DATAVERSE</text>
  <text x="880" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Referral Record</text>
  <text x="880" y="126" text-anchor="middle" font-size="8" fill="#555">Letter + status: submitted</text>

  <!-- MISSED REFERRAL SECTION -->
  <rect x="0" y="160" width="1000" height="4" fill="#ddd"/>
  <text x="20" y="188" font-size="10" font-weight="700" fill="#003A5D" letter-spacing="1">MISSED REFERRAL SAFETY NET (CDS flags during consultation)</text>
  <line x1="430" y1="184" x2="980" y2="184" stroke="#ddd" stroke-width="1"/>

  <rect x="20" y="204" width="220" height="55" rx="8" fill="#e0f7ff" stroke="#00B0F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#005a8c">CDS AGENT (during consult)</text>
  <text x="130" y="236" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Referral Check</text>
  <text x="130" y="250" text-anchor="middle" font-size="8" fill="#555">Diagnosis vs referral criteria</text>

  <line x1="244" y1="231" x2="272" y2="231" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="280" y="204" width="220" height="55" rx="8" fill="#fef3cd" stroke="#ffc107" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#664d03">CLINICIAN PROMPTED</text>
  <text x="390" y="236" text-anchor="middle" font-size="10" font-weight="600" fill="#664d03">Referral recommended</text>
  <text x="390" y="250" text-anchor="middle" font-size="8" fill="#997a00">Clinician approves &#x2192; triggers letter gen above</text>

  <line x1="504" y1="231" x2="532" y2="231" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent flow for post-consult alert if clinician dismissed -->
  <rect x="540" y="204" width="220" height="55" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#1b5e20">AGENT FLOW (if dismissed)</text>
  <text x="650" y="236" text-anchor="middle" font-size="10" font-weight="600" fill="#003A5D">Follow-up Outlook Alert</text>
  <text x="650" y="250" text-anchor="middle" font-size="8" fill="#555">Async reminder with guideline ref</text>

  <line x1="764" y1="231" x2="792" y2="231" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="800" y="210" width="180" height="42" rx="6" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>
  <text x="890" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#666">AUDIT LOG</text>
  <text x="890" y="244" text-anchor="middle" font-size="8" fill="#555">Decision + reason recorded</text>

  <!-- STATUS TRACKING SECTION -->
  <rect x="0" y="316" width="1000" height="4" fill="#ddd"/>
  <text x="20" y="344" font-size="10" font-weight="700" fill="#003A5D" letter-spacing="1">STATUS TRACKING + PATIENT QUERIES</text>
  <line x1="300" y1="340" x2="980" y2="340" stroke="#ddd" stroke-width="1"/>

  <!-- Power Automate monitoring -->
  <rect x="20" y="360" width="190" height="50" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#1b5e20">POWER AUTOMATE</text>
  <text x="115" y="396" text-anchor="middle" font-size="9" font-weight="600" fill="#003A5D">Monitor status changes</text>

  <line x1="214" y1="385" x2="242" y2="385" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="360" width="180" height="50" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#666">DATAVERSE</text>
  <text x="340" y="396" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Update referral status</text>

  <!-- Patient query flow -->
  <rect x="500" y="360" width="150" height="50" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="575" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#664d03">PATIENT QUERY</text>
  <text x="575" y="396" text-anchor="middle" font-size="9" font-weight="600" fill="#664d03">Via chatbot</text>

  <line x1="654" y1="385" x2="682" y2="385" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="690" y="360" width="150" height="50" rx="8" fill="#E8F4FA" stroke="#0070AD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="765" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#0070AD">COPILOT STUDIO</text>
  <text x="765" y="396" text-anchor="middle" font-size="9" font-weight="600" fill="#003A5D">Read from Dataverse</text>

  <line x1="844" y1="385" x2="872" y2="385" stroke="#0070AD" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="880" y="360" width="100" height="50" rx="8" fill="#d4edda" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="930" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#2E8B57">RESPONSE</text>
  <text x="930" y="396" text-anchor="middle" font-size="8" fill="#155724">Plain language</text>

  <!-- Data context -->
  <rect x="20" y="430" width="960" height="34" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="36" y="452" font-size="9" font-weight="700" fill="#003A5D">Dataverse tables:</text>
  <text x="160" y="452" font-size="9" fill="#555">Referrals (read/write) | Patients (read) | Encounters (read) | Guidelines (read) | Audit Log (write)</text>
</svg>
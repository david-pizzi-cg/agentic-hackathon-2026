<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003A5D"/>
      <stop offset="40%" stop-color="#003A5D"/>
      <stop offset="40%" stop-color="#0070AD"/>
      <stop offset="100%" stop-color="#0070AD"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- ============ HEADER BAR ============ -->
  <rect width="1100" height="70" fill="url(#headerGrad)"/>
  <text x="20" y="32" fill="white" font-size="11" font-weight="600" letter-spacing="0.5">CASE OVERVIEW</text>
  <text x="170" y="32" fill="white" font-size="11" opacity="0.8" font-style="italic">Healthcare</text>
  <text x="20" y="55" fill="white" font-size="15" font-weight="400">Clinical Workflow Orchestration</text>
  <text x="1080" y="48" text-anchor="end" fill="white" font-size="22" font-weight="700">Pain Points &amp; Solution Mapping</text>

  <!-- ============ BODY BACKGROUND ============ -->
  <rect y="70" width="1100" height="490" fill="#FAFBFC"/>

  <!-- ============ PAIN POINTS (LEFT COLUMN) ============ -->

  <!-- Pain Point 1 -->
  <rect x="30" y="90" width="440" height="100" rx="8" fill="#F0AD4E" filter="url(#shadow)"/>
  <rect x="30" y="90" width="6" height="100" rx="3" fill="#D4891A"/>
  <text x="52" y="113" fill="white" font-size="13" font-weight="700">1. Fragmentation of workflow</text>
  <text x="52" y="132" fill="#3A2600" font-size="11">Everyone (clinician, admin, patient) is compensating</text>
  <text x="52" y="147" fill="#3A2600" font-size="11">for a disconnected system. This leads to rework,</text>
  <text x="52" y="162" fill="#3A2600" font-size="11">errors, and burnout.</text>

  <!-- Pain Point 2 -->
  <rect x="30" y="200" width="440" height="100" rx="8" fill="#F0AD4E" filter="url(#shadow)"/>
  <rect x="30" y="200" width="6" height="100" rx="3" fill="#D4891A"/>
  <text x="52" y="223" fill="white" font-size="13" font-weight="700">2. Information bottlenecks</text>
  <text x="52" y="242" fill="#3A2600" font-size="11">Critical information is locked inside emails, documents,</text>
  <text x="52" y="257" fill="#3A2600" font-size="11">phone calls, EMR notes. It isn't structured, visible,</text>
  <text x="52" y="272" fill="#3A2600" font-size="11">or sharable.</text>

  <!-- Pain Point 3 -->
  <rect x="30" y="310" width="440" height="100" rx="8" fill="#F0AD4E" filter="url(#shadow)"/>
  <rect x="30" y="310" width="6" height="100" rx="3" fill="#D4891A"/>
  <text x="52" y="333" fill="white" font-size="13" font-weight="700">3. Constant "micro-delays" that add up</text>
  <text x="52" y="352" fill="#3A2600" font-size="11">Individually tiny... together catastrophic: waiting for a</text>
  <text x="52" y="367" fill="#3A2600" font-size="11">clinician reply, checking a referral portal, re-typing data,</text>
  <text x="52" y="382" fill="#3A2600" font-size="11">correcting errors. Erodes system performance.</text>

  <!-- Pain Point 4 -->
  <rect x="30" y="420" width="440" height="110" rx="8" fill="#F0AD4E" filter="url(#shadow)"/>
  <rect x="30" y="420" width="6" height="110" rx="3" fill="#D4891A"/>
  <text x="52" y="443" fill="white" font-size="13" font-weight="700">4. Failure to surface early warning signals</text>
  <text x="52" y="462" fill="#3A2600" font-size="11">The system doesn't proactively highlight: urgent triage</text>
  <text x="52" y="477" fill="#3A2600" font-size="11">cues, inconsistent documentation, missing referral fields,</text>
  <text x="52" y="492" fill="#3A2600" font-size="11">duplicated appointments. So humans catch everything manually.</text>

  <!-- ============ CONNECTOR: VERTICAL LINE + HORIZONTAL ARROW ============ -->
  <!-- Vertical line along the right edge of pain points -->
  <line x1="490" y1="140" x2="490" y2="475" stroke="#0070AD" stroke-width="2.5"/>
  <!-- Top cap -->
  <line x1="480" y1="140" x2="490" y2="140" stroke="#0070AD" stroke-width="2.5"/>
  <!-- Bottom cap -->
  <line x1="480" y1="475" x2="490" y2="475" stroke="#0070AD" stroke-width="2.5"/>
  <!-- Horizontal arrow line -->
  <line x1="490" y1="308" x2="545" y2="308" stroke="#0070AD" stroke-width="2.5"/>
  <!-- Arrowhead (triangle) -->
  <polygon points="545,300 560,308 545,316" fill="#0070AD"/>

  <!-- ============ SOLUTION BOX (RIGHT SIDE) ============ -->
  <rect x="565" y="90" width="510" height="440" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="565" y="90" width="6" height="440" rx="3" fill="#0070AD"/>

  <!-- Solution Title -->
  <text x="590" y="120" fill="#003A5D" font-size="16" font-weight="700">What the solution could do...</text>
  <line x1="590" y1="130" x2="1050" y2="130" stroke="#0070AD" stroke-width="1" opacity="0.3"/>

  <!-- Solution Item 1 -->
  <text x="600" y="162" fill="#0070AD" font-size="20">&#x2705;</text>
  <text x="625" y="163" fill="#003A5D" font-size="12" font-weight="700">Reducing cognitive load, not just workload</text>
  <text x="625" y="181" fill="#555" font-size="11">Synthesis, summarisation, context-bridging across</text>
  <text x="625" y="196" fill="#555" font-size="11">clinical encounters and documentation.</text>

  <!-- Solution Item 2 -->
  <text x="600" y="232" fill="#0070AD" font-size="20">&#x2705;</text>
  <text x="625" y="233" fill="#003A5D" font-size="12" font-weight="700">Creating workflow certainty</text>
  <text x="625" y="251" fill="#555" font-size="11">Status visibility, predictable next steps, reduced</text>
  <text x="625" y="266" fill="#555" font-size="11">ambiguity for every role in the care chain.</text>

  <!-- Solution Item 3 -->
  <text x="600" y="302" fill="#0070AD" font-size="20">&#x2705;</text>
  <text x="625" y="303" fill="#003A5D" font-size="12" font-weight="700">Replacing ambiguity with clarity</text>
  <text x="625" y="321" fill="#555" font-size="11">Structured triage data, complete referrals, consistent</text>
  <text x="625" y="336" fill="#555" font-size="11">communication templates and outputs.</text>

  <!-- Solution Item 4 -->
  <text x="600" y="372" fill="#0070AD" font-size="20">&#x2705;</text>
  <text x="625" y="373" fill="#003A5D" font-size="12" font-weight="700">Removing fragmentation</text>
  <text x="625" y="391" fill="#555" font-size="11">Single orchestration layer across email, Teams, EMR,</text>
  <text x="625" y="406" fill="#555" font-size="11">templates, and patient interactions.</text>

  <!-- Insight callout at bottom of solution box -->
  <rect x="590" y="440" width="460" height="70" rx="6" fill="#E8F4FA"/>
  <text x="610" y="463" fill="#003A5D" font-size="11" font-weight="700">Key Insight</text>
  <text x="610" y="480" fill="#333" font-size="10">The goal is not to automate clinicians out of the loop &#x2014; it is to</text>
  <text x="610" y="494" fill="#333" font-size="10">remove the administrative friction so they can focus on patient care.</text>

  <!-- ============ FOOTER BAR ============ -->
  <rect y="560" width="1100" height="40" fill="#003A5D"/>
  <text x="550" y="585" text-anchor="middle" fill="white" font-size="11" font-weight="400" opacity="0.8">AgentCare &#x2014; Pain Points &amp; Solution Mapping | Capgemini | Microsoft Agentic Industry Hackathon 2026</text>

</svg>
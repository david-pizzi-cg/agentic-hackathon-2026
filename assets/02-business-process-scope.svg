<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">

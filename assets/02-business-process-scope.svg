  <line x1="485" y1="160" x2="485" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="567" y1="160" x2="567" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>

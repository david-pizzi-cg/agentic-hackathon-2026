  <text x="112" y="245" fill="#444" font-size="7">Emergency scan (pre-auth)</text>
  <circle cx="104" cy="256" r="4" fill="#0070AD"/>
  <text x="112" y="259" fill="#444" font-size="7">Sign-in + history load</text>
  <circle cx="104" cy="270" r="4" fill="#0070AD"/>
  <text x="112" y="273" fill="#444" font-size="7">Symptom Q&amp;A</text>
  <circle cx="104" cy="284" r="4" fill="#0070AD"/>
  <text x="112" y="287" fill="#444" font-size="7">History-aware urgency</text>
  <circle cx="104" cy="298" r="4" fill="#0070AD"/>
  <text x="112" y="301" fill="#444" font-size="7">Care advice / routing</text>
  <circle cx="280" cy="242" r="4" fill="#475569"/>
  <text x="288" y="245" fill="#444" font-size="7">FAQ handling</text>
  <circle cx="280" cy="256" r="4" fill="#475569"/>
  <text x="288" y="259" fill="#444" font-size="7">SOAP (S) pre-fill</text>
  <circle cx="280" cy="270" r="4" fill="#475569"/>
  <text x="288" y="273" fill="#444" font-size="7">Triage log to Dataverse</text>
  <circle cx="280" cy="284" r="4" fill="#0070AD"/>
  <text x="288" y="287" fill="#444" font-size="7">Receptionist escalation</text>

  <!-- Scheduling Agent (6 tasks, 2 columns) -->
  <circle cx="458" cy="242" r="4" fill="#475569"/>
  <text x="466" y="245" fill="#444" font-size="7">Check availability</text>
  <circle cx="458" cy="256" r="4" fill="#475569"/>
  <text x="466" y="259" fill="#444" font-size="7">Book / reschedule</text>
  <circle cx="458" cy="270" r="4" fill="#475569"/>
  <text x="466" y="273" fill="#444" font-size="7">Send confirmation</text>
  <circle cx="458" cy="284" r="4" fill="#475569"/>
  <text x="466" y="287" fill="#444" font-size="7">Waitlist management</text>
  <circle cx="608" cy="242" r="4" fill="#475569"/>
  <text x="616" y="245" fill="#444" font-size="7">Cancellation handling</text>
  <circle cx="608" cy="256" r="4" fill="#475569"/>
  <text x="616" y="259" fill="#444" font-size="7">Appointment reminder</text>

  <!-- Documentation Agent (8 tasks, 2 columns) -->
  <circle cx="762" cy="242" r="4" fill="#0070AD"/>
  <text x="770" y="245" fill="#444" font-size="7">Load triage + history</text>
  <circle cx="762" cy="256" r="4" fill="#6f42c1"/>
  <text x="770" y="259" fill="#444" font-size="7">Generate pre-consult summary</text>
  <circle cx="762" cy="270" r="4" fill="#475569"/>
  <text x="770" y="273" fill="#444" font-size="7">Send Teams briefing</text>
  <circle cx="762" cy="284" r="4" fill="#0070AD"/>
  <text x="770" y="287" fill="#444" font-size="7">Fetch transcript</text>
  <circle cx="960" cy="242" r="4" fill="#6f42c1"/>
  <text x="968" y="245" fill="#444" font-size="7">Draft SOAP note</text>
  <circle cx="960" cy="256" r="4" fill="#6f42c1"/>
  <text x="968" y="259" fill="#444" font-size="7">Entity extraction</text>
  <circle cx="960" cy="270" r="4" fill="#475569"/>
  <text x="968" y="273" fill="#444" font-size="7">Save to Dataverse</text>
  <circle cx="960" cy="284" r="4" fill="#475569"/>
  <text x="968" y="287" fill="#444" font-size="7">Email patient summary</text>

  <!-- Data platform bar -->
  <text x="96" y="324" fill="#333" font-size="7" font-weight="600" opacity="0.5" letter-spacing="0.5">DATA PLATFORM, DATA GOVERNANCE, DATA MANAGEMENT</text>
  <rect x="92" y="332" width="1100" height="22" rx="4" fill="white" stroke="#aaa" stroke-width="1" filter="url(#shadow)"/>
  <text x="642" y="347" text-anchor="middle" fill="#333" font-size="9">
    <tspan font-weight="700">Dataverse</tspan>
    <tspan dx="12">Patients</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Triage Records</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Appointments</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Encounters</tspan>
    <tspan dx="8">|</tspan>
    <tspan dx="8">Audit Logs</tspan>
  </text>

  <!-- Vertical dividers between sub-process columns -->
  <line x1="442" y1="86" x2="442" y2="360" stroke="#0070AD" stroke-width="0.8" opacity="0.12"/>
  <line x1="746" y1="86" x2="746" y2="360" stroke="#0070AD" stroke-width="0.8" opacity="0.12"/>

  <!-- ============================================================ -->
  <!-- DIGITAL (full width)                                         -->
  <!-- ============================================================ -->
  <rect x="18" y="364" width="24" height="45" rx="3" fill="#2E8B57"/>
  <text x="30" y="388" text-anchor="middle" fill="white" font-size="8" font-weight="700" letter-spacing="0.5" transform="rotate(-90 30 388)">DIGITAL</text>

  <rect x="92" y="364" width="1100" height="45" fill="#e8f5e9"/>

  <rect x="96" y="370" width="200" height="30" rx="4" fill="white" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="196" y="389" text-anchor="middle" fill="#333" font-size="9" font-weight="600">Copilot Studio</text>
  <rect x="304" y="370" width="200" height="30" rx="4" fill="white" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="404" y="389" text-anchor="middle" fill="#333" font-size="9" font-weight="600">Power Automate</text>
  <rect x="512" y="370" width="200" height="30" rx="4" fill="white" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="612" y="389" text-anchor="middle" fill="#333" font-size="9" font-weight="600">Dataverse</text>
  <rect x="720" y="370" width="156" height="30" rx="4" fill="white" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="798" y="389" text-anchor="middle" fill="#333" font-size="9" font-weight="600">Teams</text>
  <rect x="884" y="370" width="156" height="30" rx="4" fill="white" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="962" y="389" text-anchor="middle" fill="#333" font-size="9" font-weight="600">Outlook</text>
  <rect x="1048" y="370" width="140" height="30" rx="4" fill="white" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="1118" y="389" text-anchor="middle" fill="#333" font-size="9" font-weight="600">Entra ID</text>

  <!-- ============================================================ -->
  <!-- LEGEND (bottom)                                              -->
  <!-- ============================================================ -->
  <rect x="18" y="424" width="1174" height="30" rx="6" fill="white" stroke="none"/>
  <circle cx="980" cy="439" r="5" fill="#0070AD"/>
  <text x="990" y="443" fill="#555" font-size="9" font-weight="600">Agentic AI</text>
  <circle cx="1070" cy="439" r="5" fill="#6f42c1"/>
  <text x="1080" y="443" fill="#555" font-size="9" font-weight="600">Gen AI</text>
  <circle cx="1130" cy="439" r="5" fill="#475569"/>
  <text x="1140" y="443" fill="#555" font-size="9" font-weight="600">Automation</text>

</svg>

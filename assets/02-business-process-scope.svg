<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003A5D"/>
      <stop offset="40%" stop-color="#003A5D"/>
      <stop offset="40%" stop-color="#0070AD"/>
      <stop offset="100%" stop-color="#0070AD"/>
    </linearGradient>
  </defs>

  <!-- HEADER -->
  <rect width="1200" height="46" fill="url(#headerGrad)"/>
  <text x="20" y="18" fill="white" font-size="10" font-weight="600" letter-spacing="0.5">CASE OVERVIEW</text>
  <text x="160" y="18" fill="white" font-size="10" opacity="0.8" font-style="italic">Healthcare</text>
  <text x="20" y="35" fill="white" font-size="14" font-weight="400">Clinical Workflow Orchestration</text>
  <text x="1180" y="32" text-anchor="end" fill="white" font-size="20" font-weight="700">Use Case Scope in the Business Process</text>

  <!-- BODY -->
  <rect y="46" width="1200" height="424" fill="#FAFBFC"/>

  <!-- SCOPE INDICATOR -->
  <rect x="8" y="66" width="1190" height="350" rx="10" fill="none" stroke="#00B0F0" stroke-width="3" stroke-dasharray="12 6" opacity="0.6"/>
  <rect x="1040" y="60" width="130" height="20" rx="4" fill="#00B0F0"/>
  <text x="1105" y="74" text-anchor="middle" fill="white" font-size="9" font-weight="600" letter-spacing="0.5">USE CASE SCOPE</text>

  <!-- Column shading (alternating) spanning PROCESSES + DATA & AI -->
  <rect x="92" y="86" width="350" height="274" fill="#e8eef3" opacity="0.5"/>
  <rect x="446" y="86" width="300" height="274" fill="#dfe8f0" opacity="0.5"/>
  <rect x="750" y="86" width="442" height="274" fill="#e8eef3" opacity="0.5"/>

  <!-- ============================================================ -->
  <!-- PROCESSES                                                    -->
  <!-- ============================================================ -->
  <rect x="18" y="86" width="24" height="80" rx="3" fill="#003A5D"/>
  <text x="30" y="126" text-anchor="middle" fill="white" font-size="8" font-weight="700" letter-spacing="0.5" transform="rotate(-90 30 126)">PROCESSES</text>
  <!-- Row labels -->
  <text x="46" y="118" fill="#003A5D" font-size="7" font-weight="700">L2</text>
  <text x="46" y="126" fill="#6C757D" font-size="5.5">3 sub-processes</text>
  <text x="46" y="146" fill="#003A5D" font-size="7" font-weight="700">L3</text>
  <text x="46" y="154" fill="#6C757D" font-size="5.5">10 macro tasks</text>

  <!-- Process bar -->
  <rect x="92" y="86" width="1100" height="20" rx="4" fill="#003A5D"/>
  <text x="642" y="100" text-anchor="middle" fill="white" font-size="10" font-weight="700">Clinical Workflow Management</text>

  <!-- Sub-processes (L2) -->
  <rect x="92" y="110" width="350" height="22" rx="4" fill="#003A5D" opacity="0.82"/>
  <text x="267" y="125" text-anchor="middle" fill="white" font-size="9" font-weight="600">Patient Intake &amp; Triage</text>
  <rect x="446" y="110" width="300" height="22" rx="4" fill="#003A5D" opacity="0.82"/>
  <text x="596" y="125" text-anchor="middle" fill="white" font-size="9" font-weight="600">Appointment Management</text>
  <rect x="750" y="110" width="442" height="22" rx="4" fill="#003A5D" opacity="0.82"/>
  <text x="971" y="125" text-anchor="middle" fill="white" font-size="9" font-weight="600">Consultation &amp; Documentation</text>

  <!-- Macro tasks (L3) -->
  <!-- Triage (3 tasks in 350px) -->
  <rect x="96" y="138" width="108" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="150" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Emergency Scan</text>
  <rect x="208" y="138" width="108" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="262" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Symptom Collect.</text>
  <rect x="320" y="138" width="118" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="379" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Urgency Classify</text>

  <!-- Scheduling (3 tasks in 300px) -->
  <rect x="450" y="138" width="92" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="496" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Availability</text>
  <rect x="546" y="138" width="92" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="592" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Booking</text>
  <rect x="642" y="138" width="100" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="692" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Confirmation</text>

  <!-- Documentation (4 tasks in 442px) -->
  <rect x="754" y="138" width="104" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="806" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Pre-consult Load</text>
  <rect x="862" y="138" width="94" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="909" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">SOAP Draft</text>
  <rect x="960" y="138" width="104" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="1012" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Entity Extract</text>
  <rect x="1068" y="138" width="120" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="1128" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Save &amp; Notify</text>

  <!-- ============================================================ -->
  <!-- DATA & AI                                                    -->
  <!-- ============================================================ -->
  <rect x="18" y="170" width="24" height="190" rx="3" fill="#0070AD"/>
  <text x="30" y="265" text-anchor="middle" fill="white" font-size="8" font-weight="700" letter-spacing="0.5" transform="rotate(-90 30 265)">DATA &amp; AI</text>
  <!-- Row labels -->
  <text x="46" y="206" fill="#0070AD" font-size="7" font-weight="700">AGENTS</text>
  <text x="46" y="214" fill="#6C757D" font-size="5.5">3 AI agents</text>
  <text x="46" y="242" fill="#0070AD" font-size="7" font-weight="700">L4</text>
  <text x="46" y="250" fill="#6C757D" font-size="5.5">23 micro tasks</text>


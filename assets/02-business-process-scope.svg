  <line x1="610" y1="86" x2="610" y2="360" stroke="#0070AD" stroke-width="0.8" opacity="0.12"/>
  <line x1="919" y1="86" x2="919" y2="360" stroke="#0070AD" stroke-width="0.8" opacity="0.12"/>


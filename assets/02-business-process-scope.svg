  <text x="136" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Emergency Scan</text>
  <rect x="180" y="138" width="80" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="220" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Symptom Collect.</text>
  <rect x="264" y="138" width="88" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="308" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Urgency Classify</text>

  <!-- Scheduling -->

  <circle cx="372" cy="256" r="4" fill="#475569"/>
  <text x="380" y="259" fill="#444" font-size="7">Book / reschedule</text>
  <circle cx="372" cy="270" r="4" fill="#475569"/>
  <text x="380" y="273" fill="#444" font-size="7">Send confirmation email</text>
  <circle cx="372" cy="284" r="4" fill="#475569"/>

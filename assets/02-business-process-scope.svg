    <tspan dx="5">|</tspan>
    <tspan dx="5">Triage Records</tspan>
    <tspan dx="5">|</tspan>
    <tspan dx="5">Appointments</tspan>
    <tspan dx="5">|</tspan>
    <tspan dx="5">Encounters</tspan>
    <tspan dx="5">|</tspan>
    <tspan dx="5">Referrals</tspan>
    <tspan dx="5">|</tspan>
    <tspan dx="5">Audit Logs</tspan>
  </text>


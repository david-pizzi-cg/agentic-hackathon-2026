  <text x="267" y="213" text-anchor="middle" fill="white" font-size="8.5" font-weight="600">Triage Agent</text>

  <rect x="446" y="196" width="300" height="26" rx="4" fill="#0070AD" filter="url(#shadow)"/>
  <text x="596" y="213" text-anchor="middle" fill="white" font-size="8.5" font-weight="600">Scheduling Agent</text>

  <rect x="750" y="196" width="442" height="26" rx="4" fill="#0070AD" filter="url(#shadow)"/>
  <text x="971" y="213" text-anchor="middle" fill="white" font-size="8.5" font-weight="600">Documentation Agent</text>


  <text x="403" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Availability</text>
  <rect x="446" y="138" width="78" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="485" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Booking</text>
  <rect x="528" y="138" width="78" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="567" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Confirmation</text>

  <!-- Documentation -->
  <rect x="618" y="138" width="72" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="654" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">History Load</text>
  <rect x="694" y="138" width="72" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="730" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">SOAP Pre-fill</text>
  <rect x="770" y="138" width="72" height="22" rx="3" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="806" y="153" text-anchor="middle" fill="#333" font-size="7.5" font-weight="600">Note Struct.</text>

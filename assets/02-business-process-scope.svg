  <line x1="150" y1="160" x2="150" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="262" y1="160" x2="262" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="379" y1="160" x2="379" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <!-- Scheduling connectors -->
  <line x1="496" y1="160" x2="496" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="592" y1="160" x2="592" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="692" y1="160" x2="692" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <!-- Documentation connectors -->
  <line x1="806" y1="160" x2="806" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="909" y1="160" x2="909" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="1012" y1="160" x2="1012" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="1128" y1="160" x2="1128" y2="196" stroke="#0070AD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>


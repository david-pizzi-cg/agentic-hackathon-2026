  <circle cx="935" cy="256" r="4" fill="#0070AD"/>
  <text x="943" y="259" fill="#444" font-size="7">Validate completeness</text>
  <circle cx="935" cy="270" r="4" fill="#475569"/>
  <text x="943" y="273" fill="#444" font-size="7">Clinician review</text>
  <circle cx="935" cy="284" r="4" fill="#475569"/>
